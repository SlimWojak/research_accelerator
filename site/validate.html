<title>a8ra Validation Mode — Detection Browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e17;
    --surface: #131722;
    --surface2: #1e222d;
    --border: #2a2e39;
    --text: #d1d4dc;
    --muted: #787b86;
    --faint: #4a4e59;
    --teal: #26a69a;
    --red: #ef5350;
    --blue: #2962ff;
    --yellow: #f7c548;
    --purple: #9c27b0;
    --font: 'IBM Plex Sans', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────────────────────────────── */

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    height: 48px;
    min-height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }

  .header-badge {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--blue);
    background: rgba(41,98,255,0.15);
    padding: 2px 8px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .header-spacer { flex: 1; }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-nav a {
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
  }
  .header-nav a:hover { color: var(--text); }

  /* ── Week Picker ─────────────────────────────────────────────────────── */

  .week-picker-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .week-picker-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #week-picker {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
  }
  #week-picker:focus { border-color: var(--blue); }
  #week-picker option { background: var(--bg); color: var(--text); }

  /* ── Controls Bar ────────────────────────────────────────────────────── */

  .controls-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .controls-bar .separator {
    width: 1px;
    height: 20px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* ── TF Buttons ──────────────────────────────────────────────────────── */

  .tf-group {
    display: flex;
    gap: 4px;
  }

  .tf-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tf-btn:hover { color: var(--text); border-color: var(--faint); }
  .tf-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* ── Day Tabs ────────────────────────────────────────────────────────── */

  .day-tabs {
    display: flex;
    gap: 0;
  }

  .day-tab {
    font-family: var(--font);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .day-tab:hover { color: var(--text); }
  .day-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* ── Primitive Toggles ───────────────────────────────────────────────── */

  .prim-toggles {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .prim-toggle {
    font-family: var(--font);
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .prim-toggle:hover { color: var(--text); border-color: var(--faint); }
  .prim-toggle.active { color: #fff; border-color: var(--teal); background: rgba(38,166,154,0.18); }

  .prim-swatch {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    display: inline-block;
  }

  /* ── Session Legend ──────────────────────────────────────────────────── */

  .session-legend {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-left: auto;
  }

  .session-legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--muted);
  }

  .session-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    display: inline-block;
  }

  /* ── Main Area ───────────────────────────────────────────────────────── */

  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  /* ── Chart Container ─────────────────────────────────────────────────── */

  .chart-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  #chart-container {
    width: 100%;
    height: 100%;
  }

  /* ── Loading Overlay ─────────────────────────────────────────────────── */

  .loading-overlay {
    position: absolute;
    inset: 0;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    font-size: 13px;
    color: var(--muted);
  }
  .loading-overlay.hidden { display: none; }

  /* ── Metadata Bar ────────────────────────────────────────────────────── */

  .metadata-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 4px 20px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    min-height: 28px;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .meta-value {
    font-family: var(--mono);
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* ── Detection Summary ───────────────────────────────────────────────── */

  .detection-summary {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .det-count-item {
    font-family: var(--mono);
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .det-count-label {
    color: var(--muted);
  }

  .det-count-value {
    font-variant-numeric: tabular-nums;
  }

  /* ── Footer ──────────────────────────────────────────────────────────── */

  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    font-size: 11px;
    color: var(--muted);
  }

  .footer a {
    color: var(--muted);
    text-decoration: none;
  }
  .footer a:hover { color: var(--text); }

  /* ── Empty State ─────────────────────────────────────────────────────── */

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 13px;
    gap: 8px;
  }

  .empty-state-icon { font-size: 32px; opacity: 0.5; }

  /* ── GT Popover ──────────────────────────────────────────────────────── */

  .vgt-popover {
    position: fixed;
    z-index: 200;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    min-width: 160px;
  }

  .vgt-popover-title {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .vgt-popover-options { display: flex; gap: 6px; }

  .vgt-popover-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 11px;
    color: var(--text);
    transition: all 0.15s;
  }
  .vgt-popover-btn:hover {
    border-color: var(--btn-color, var(--faint));
    background: rgba(255,255,255,0.04);
  }
  .vgt-popover-btn-active {
    border-color: var(--btn-color, var(--teal));
    background: rgba(255,255,255,0.08);
  }

  .vgt-popover-icon { font-size: 14px; font-weight: 700; }
  .vgt-popover-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; }

  /* ── GT Label Action Bar ─────────────────────────────────────────────── */

  .gt-action-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px;
    height: 32px;
    min-height: 32px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    font-size: 11px;
  }

  .gt-action-bar .gt-bar-title {
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 10px;
  }

  .label-count-item {
    font-family: var(--mono);
    font-size: 11px;
    margin-right: 6px;
  }

  .gt-bar-btn {
    font-family: var(--font);
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: auto;
  }
  .gt-bar-btn:hover { color: var(--text); border-color: var(--faint); }
  .gt-bar-btn + .gt-bar-btn { margin-left: 4px; }

  /* ── Lock Panel (slide-in) ───────────────────────────────────────────── */

  #lock-panel {
    position: fixed;
    top: 0;
    right: -320px;
    width: 320px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 150;
    transition: right 0.25s ease;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  #lock-panel.visible { right: 0; }

  .lock-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .lock-panel-header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .lock-panel-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
  }
  .lock-panel-close:hover { color: var(--text); }

  #lock-panel-content { padding: 12px 16px; flex: 1; }

  .vlock-section { margin-bottom: 16px; }

  .vlock-section-title {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }

  .vlock-empty { font-size: 12px; color: var(--faint); font-style: italic; }

  .vlock-params-list { display: flex; flex-direction: column; gap: 2px; }

  .vlock-param-group {
    font-size: 11px;
    font-weight: 600;
    color: var(--blue);
    margin-top: 8px;
    margin-bottom: 2px;
    text-transform: capitalize;
  }

  .vlock-param-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 0;
    font-size: 11px;
  }

  .vlock-param-key {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
  }

  .vlock-param-val {
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }

  .vlock-notes-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 8px;
    resize: vertical;
    outline: none;
  }
  .vlock-notes-input:focus { border-color: var(--blue); }

  .vlock-buttons { display: flex; flex-direction: column; gap: 6px; }

  .vlock-btn {
    font-family: var(--font);
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }

  .vlock-btn-primary {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }
  .vlock-btn-primary:hover { opacity: 0.85; }

  .vlock-btn-secondary {
    background: var(--bg);
    color: var(--muted);
  }
  .vlock-btn-secondary:hover { color: var(--text); border-color: var(--faint); }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <span class="header-title">a8ra Validation Mode</span>
    <span class="header-badge">Detection Browser</span>
    <div class="week-picker-group">
      <span class="week-picker-label">Week</span>
      <select id="week-picker"><option value="">Loading…</option></select>
    </div>
    <div class="header-spacer"></div>
    <div class="header-nav">
      <a href="index.html">← Index</a>
      <a href="compare.html">Calibration</a>
    </div>
  </div>

  <!-- Controls Bar -->
  <div class="controls-bar">
    <div class="day-tabs" id="day-tabs"></div>
    <div class="separator"></div>
    <div class="tf-group" id="tf-group"></div>
    <div class="separator"></div>
    <div class="prim-toggles" id="prim-toggles"></div>
    <div class="session-legend" id="session-legend"></div>
  </div>

  <!-- GT Action Bar -->
  <div class="gt-action-bar">
    <span class="gt-bar-title">Labels</span>
    <span id="label-counts"></span>
    <button class="gt-bar-btn" id="btn-export-labels-bar" title="Export labels JSON">📥 Export</button>
    <button class="gt-bar-btn" id="btn-lock-panel" title="Open lock panel">🔒 Lock</button>
  </div>

  <!-- Main Area -->
  <div class="main-area">
    <div class="chart-wrapper">
      <div id="chart-container">
        <div class="empty-state" id="empty-state">
          <div class="empty-state-icon">📊</div>
          <div>Select a week to begin browsing detections</div>
        </div>
      </div>
      <div class="loading-overlay hidden" id="loading-overlay">Loading chart data…</div>
    </div>
  </div>

  <!-- Lock Panel (slide-in from right) -->
  <div id="lock-panel">
    <div class="lock-panel-header">
      <span class="lock-panel-header-title">🔒 Lock Panel</span>
      <button class="lock-panel-close" id="lock-panel-close-btn">✕</button>
    </div>
    <div id="lock-panel-content"></div>
  </div>

  <!-- Metadata Bar -->
  <div class="metadata-bar" id="metadata-bar">
    <div class="meta-item">
      <span>Week:</span>
      <span class="meta-value" id="meta-week">—</span>
    </div>
    <div class="meta-item">
      <span>Range:</span>
      <span class="meta-value" id="meta-range">—</span>
    </div>
    <div class="meta-item">
      <span>Detections:</span>
      <span class="meta-value" id="meta-detections">—</span>
    </div>
    <div class="detection-summary" id="detection-summary"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
  </div>
</div>

<script src="js/validate-app.js"></script>
<script src="js/validate-chart.js"></script>
<script src="js/validate-gt.js"></script>
</body>
</html>
