# REFERENCE LEVELS — not primitives, but L1 computations
# ═══════════════════════════════════════════════════════════════════════════════

REFERENCE_LEVELS:

  PDH_PDL:
    pseudocode: |
      prev_day_bars = bars where forex_day == previous_day
      pdh = max(bar.high for bar in prev_day_bars)
      pdl = min(bar.low  for bar in prev_day_bars)
    boundary: "17:00 NY forex day"
    measurement: "Wicks (not closes) — liquidity sits at extremes"
    utc_handling: |
      17:00 NY boundary shifts with DST:
        US Winter (Nov-Mar): 17:00 EST = 22:00 UTC
        US Summer (Mar-Nov): 17:00 EDT = 21:00 UTC
      Calibration dataset (Jan 7-12 2024): US winter time throughout.
      All forex day boundaries at 22:00 UTC. No DST transition in sample.
      Source data (Dukascopy) stored in UTC — pipeline converts via
      America/New_York timezone, not fixed offset.
      WARNING: During US/EU DST mismatch weeks (2-3 weeks in Mar/Oct),
      London session shifts by 1 hour in NY terms. LOKZ timing affected.
      This does NOT affect PDH/PDL (17:00 NY is always 17:00 NY),
      but does affect session boundary tagging.
    status: "CONFIRMED correct — Phase 1 research + UTC note added 2026-03-05"

  MIDNIGHT_OPEN:
    pseudocode: "mo = bar.open where time == 00:00 NY"
    status: "CONFIRMED correct — Phase 1 research"

  EQUILIBRIUM:
    pseudocode: "eq = (range_high + range_low) / 2"
    status: "CONFIRMED correct"

