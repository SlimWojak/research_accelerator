# ═══════════════════════════════════════════════════════════════════════════════
# PRIMITIVE: FVG (Fair Value Gap)
# Status: CALIBRATED — 2026-03-04 Olya session
# ═══════════════════════════════════════════════════════════════════════════════

FVG:

  L1_detection:
    # Three consecutive bars: A (oldest), B (middle), C (newest)
    # Gap = price range B delivered through that A and C wicks don't cover

    bullish:
      condition: "bars[i].low > bars[i-2].high"
      zone_top: "bars[i].low"       # candle C low
      zone_bottom: "bars[i-2].high"  # candle A high
      ce: "(zone_top + zone_bottom) / 2"
      anchor_time: "bars[i-2].time"  # candle A, not C

    bearish:
      condition: "bars[i].high < bars[i-2].low"
      zone_top: "bars[i-2].low"     # candle A low
      zone_bottom: "bars[i].high"    # candle C high
      ce: "(zone_top + zone_bottom) / 2"
      anchor_time: "bars[i-2].time"

    gap_size: "abs(zone_top - zone_bottom) / pip_value"

    timeframe_rule: |
      Detect on NATIVE bar arrays per TF.
      detect_fvg(bars_5m)  → FVG_5M
      detect_fvg(bars_15m) → FVG_15M
      detect_fvg(bars_1m)  → FVG_1M (reference only)
      Different TFs produce genuinely different populations.
      5m sample: 345 FVGs vs 2017 on 1m (same week).

    bugs_fixed_from_v04:
      - "boundary used bars[i-1].high — corrected to bars[i-2].high"
      - "anchor time at candle C — corrected to candle A"

  L1_state_machine:
    # Every FVG tracks lifecycle state. State transitions are L1.
    # WHICH state matters for trading is L2.

    states:
      ACTIVE:         "Gap exists, price has not returned to zone"
      CE_TOUCHED:     "Price reached CE (midpoint) but zone not fully closed"
      BOUNDARY_CLOSED: "Price closed through full zone (opposite boundary)"
      IFVG:           "Polarity flip — see derived primitive below"

    transitions:
      ACTIVE → CE_TOUCHED:
        trigger: "any bar.close crosses CE level"
      ACTIVE → BOUNDARY_CLOSED:
        trigger: "any bar.close crosses opposite boundary"
      CE_TOUCHED → BOUNDARY_CLOSED:
        trigger: "any bar.close crosses opposite boundary"
      BOUNDARY_CLOSED → IFVG:
        trigger: "see IFVG rules below"

    tracking: |
      All state transitions logged with timestamp.
      Bead carries: [state, state_change_time, state_history[]]

  L1_tags:
    # Context metadata computed at detection time. L2 filters on these.
    session:              "asia | lokz | nyokz | other"
    displacement_present: "bool — candle B meets displacement criteria"
    bpr_zone:             "bool — overlaps with opposite-direction FVG"
    swing_proximity:      "nearest swing point within N bars"

  L15_parameters:
    floor_threshold:
      default: 0.5 pip
      range: [0.0, 2.0]
      purpose: "Exclude pure spread noise only"
      provenance: |
        Olya calibration 2026-03-04. Forensic finding: Jan 9 09:30
        bullish FVG was sub-1-pip on 5m, meaningful in context.
        Previous 1.0 pip floor missed it. Lowered to 0.5 pip.
        Context tags replace threshold as quality gate.

    # NOTE: No upper threshold. All FVGs >= floor captured.
    # Quality gating moved to L2 via context tags.

  L2_usage:
    philosophy: |
      CONFLUENCE_FIRST, not SIZE_FIRST.
      Pip size is NOT the quality gate. All FVGs >= floor captured.
      Context determines tradeability — session, displacement,
      swing proximity, HTF alignment.
    entry_method: |
      Retrace into FVG zone. Entry at boundary or CE.
      Fresh (untouched) preferred over retested.
    zone_respect: |
      "Respected" = candle BODIES stay inside zone.
      Wicks may breach. Bodies must remain within.
    invalidation: |
      CE_TOUCHED = partial fill (still valid for some setups).
      BOUNDARY_CLOSED = invalid (or becomes IFVG candidate).
      Decision on which state invalidates = L2 context.

# ═══════════════════════════════════════════════════════════════════════════════
# DERIVED PRIMITIVE: IFVG (Inverse Fair Value Gap)
# Status: IDENTIFIED — 2026-03-04 Olya session. Build pending.
# ═══════════════════════════════════════════════════════════════════════════════

IFVG:

  L1_detection:
    # Not a new scan — state transition on existing FVG
    definition: |
      A fully closed FVG flips polarity.
      Bullish FVG that gets BOUNDARY_CLOSED → becomes bearish resistance.
      Bearish FVG that gets BOUNDARY_CLOSED → becomes bullish support.
      CRITICAL: trigger is CLOSE beyond boundary, NOT wick.
      A wick touch does not create IFVG — close required.

    transition_rule:
      bullish_fvg_closed: "IFVG_BEARISH — zone now acts as resistance"
      bearish_fvg_closed: "IFVG_BULLISH — zone now acts as support"

    close_requirement: |
      IFVG inherits the BOUNDARY_CLOSED state from FVG state machine.
      BOUNDARY_CLOSED trigger = "any bar.close crosses opposite boundary"
      (FVG L1_state_machine, line 178 of this file).
      Therefore: bullish FVG invalidated when bar.close < fvg.zone_bottom.
                 bearish FVG invalidated when bar.close > fvg.zone_top.
      Wick-only breaches leave FVG in ACTIVE or CE_TOUCHED state.
      Source: ICT canonical + MQL5 ICTFVG reference implementation
      (gist.github.com/silvinob/3335e76266449a26f3c7b5890a6ecd44).

    pseudocode: |
      # BOUNDARY_CLOSED already confirmed by close (not wick)
      if fvg.state == BOUNDARY_CLOSED:
          if fvg.direction == BULLISH:
              # bar.close < fvg.zone_bottom triggered BOUNDARY_CLOSED
              fvg.state = IFVG_BEARISH
          elif fvg.direction == BEARISH:
              # bar.close > fvg.zone_top triggered BOUNDARY_CLOSED
              fvg.state = IFVG_BULLISH
          fvg.ifvg_flip_time = current_bar.time

  L15_parameters:
    # Inherits FVG floor. No additional parameters.
    inherited_from: FVG

  L2_usage:
    role: "Confluence factor — not standalone signal"
    olya_confirmed: true
    usage_frequency: regular

# ═══════════════════════════════════════════════════════════════════════════════
# DERIVED PRIMITIVE: BPR (Balanced Price Range)
# Status: IDENTIFIED — 2026-03-04 Olya session. Build pending.
# ═══════════════════════════════════════════════════════════════════════════════

BPR:

  L1_detection:
    definition: |
      Zone where a bullish FVG and bearish FVG overlap in price.
      The intersection = high-confluence area.

    pseudocode: |
      for each bullish_fvg in all_fvgs:
          for each bearish_fvg in all_fvgs:
              overlap_top = min(bullish_fvg.zone_top, bearish_fvg.zone_top)
              overlap_bot = max(bullish_fvg.zone_bottom, bearish_fvg.zone_bottom)
              if overlap_top > overlap_bot:
                  bpr = BPR(
                      zone=[overlap_bot, overlap_top],
                      bull_source=bullish_fvg,
                      bear_source=bearish_fvg
                  )

    scope: |
      BPR is a geometric overlap — computed across ALL FVGs regardless
      of lifecycle state. A closed bullish FVG overlapping a closed
      bearish FVG is still a balanced price range.
      Both source FVGs must be from same TF.
      Cross-TF BPR deferred to strategy layer.

  L15_parameters:
    min_overlap: "TBD — may not need minimum if both source FVGs passed floor"

  L2_usage:
    as_target: "Price drawn to fill balanced zone"
    as_reversal: "Fade from balanced zone"
    decision: "L2 context determines which — not detectable algorithmically"
    olya_confirmed: true

# ═══════════════════════════════════════════════════════════════════════════════
# PRIMITIVE: SWING POINTS
# Status: PENDING CALIBRATION
# ═══════════════════════════════════════════════════════════════════════════════

SWING_POINTS:

  L1_detection:
    algorithm: "N-bar pivot"
    lookback: "N bars left, N bars right"

    swing_high:
      condition: |
        bars[i].high >= all bars[i-N : i-1].high   # >= left (equality ok)
        bars[i].high >  all bars[i+1 : i+N].high   # >  right (strict)

    swing_low:
      condition: |
        bars[i].low <= all bars[i-N : i-1].low    # <= left (equality ok)
        bars[i].low <  all bars[i+1 : i+N].low    # <  right (strict)

    equality_fix: |
      v0.4 used strict > both sides — silently dropped equal highs.
      Corrected: >= left, > right. Allows equal-level detection
      on the leading bar while preventing duplicate triggers on
      trailing bars at same level.

    height: "max(bar.high - min(surrounding lows)) for swing_high (vice versa)"

    strength:
      definition: |
        Extra bars beyond N that continue to respect the swing extreme.
        Capped at 20. Measures how long the swing HELD.
      pseudocode: |
        strength = 0
        for j in range(i + N + 1, min(i + N + 21, len(bars))):
            if swing == HIGH and bars[j].high < bars[i].high:
                strength += 1
            elif swing == LOW and bars[j].low > bars[i].low:
                strength += 1
            else:
                break
      known_limitation: |
        ARCHITECTURAL ISSUE (flagged for CTO post-session):
        Strength measures bars-held-after (temporal persistence), NOT move
        magnitude. Fast decisive swings in kill zones (e.g. 5m 09:25 Jan 9)
        score dim/grey despite being material moves — because the next
        candle immediately breaches the extreme (fast continuation).
        Proposed enhancement: add ATR-relative move size as secondary
        strength input. A swing with 15-pip height but strength=2 is
        structurally more significant than a 3-pip swing with strength=15.
        Current workaround: height_filter catches magnitude, strength
        catches persistence. Both are needed but weighted differently
        depending on session context. L2 decision.
        Status: LOGGED — not blocking calibration, review post-session.

    timeframe_rule: "Native detection per TF (same principle as FVG)"

    bugs_fixed_from_v04:
      - "strict > on both sides — corrected to >= left, > right"
      - "no height filter — sub-pip noise included"
      - "no session noise filter"

  L15_parameters:
    N:
      per_tf:
        1m: 5   # no change — working correctly at 1m resolution
        5m: 3   # Olya confirmed — catches all major swings, no overcorrection
        15m: 2  # reduced from 3 — N=3 still missed 03:15 low and 03:45 high on Jan 9
      rationale: |
        Round 1 (N=5 universal): too rigid for higher TFs. LOKZ structure missed entirely.
        Round 2 (N=3 on 5m/15m): 5m approved. 15m still missing fast session swings.
        Round 3 (N=2 on 15m): captures 03:15/03:45 structures. N=2 on 15m = 30min
        window, responsive enough for kill zone moves. Height filter is the quality gate.
      note: "N=10 reserved as test oracle only (not used in production)."
      provenance: "Olya visual confirmation rounds 1-3, 2026-03-05."
      status: "5m: LOCKED | 15m: LOCKED (N=2, confirmed Olya 2026-03-05)"

    height_filter:
      per_tf:
        1m:
          default: 0.5  # pips — lowered from 2.5, Olya missing swings at higher floor
          candidates: [1.0, 1.5, 2.0, 2.5, 3.0, 4.0]
          rationale: |
            Original 2.5 pip floor too aggressive — missing swings Olya marks.
            0.5 pip floor captures all, consistent with FVG floor philosophy.
            Strength grading is the quality gate, not height.
        5m:
          default: 3.0  # pips — Olya confirmed, down from 3.5
          candidates: [2.0, 3.0, 5.0, 7.0, 10.0, 15.0]
          rationale: |
            Olya round 2: 3.0 pip captures all material swings on 5m.
            Small noise increase accepted — signal quality worth it.
        15m:
          default: 3.0  # pips — down from 10.0, captures structural shifts in fast sessions
          candidates: [3.0, 5.0, 7.0, 10.0, 15.0, 20.0]
          rationale: |
            10.0 pip floor was too aggressive for 15m — structural swings in
            fast LOKZ/NYOKZ sessions were being height-filtered out entirely.
            3.0 pip captures the major structural shifts Olya needs.
      status: "LOCKED — Olya confirmed all three TFs 2026-03-05"
      provenance: "Olya visual calibration rounds 1-3, 2026-03-05"

    strength_threshold:
      default: null  # NO GATE — strength is a tag only, not a filter
      rationale: |
        Olya decision 2026-03-05: strength grading retained as L1 tag
        (dim/mid/vivid visual on chart, useful for CTO/research) but
        NOT used as a gate for MSS or Liquidity Sweep detection.
        Both composites use ALL detected swings regardless of strength.
        Reasoning: fast decisive moves in kill zones score low strength
        (bars-held metric penalises continuation) but are structurally
        significant. Height filter is the quality gate, not strength.
      status: "LOCKED — tag only, not a gate. Olya confirmed 2026-03-05"
      provenance: "Olya calibration session decision 2026-03-05"

  L1_tags:
    session: "asia | lokz | nyokz | other"
    is_equal_high: "bool — within tolerance of another swing high"
    is_equal_low: "bool — within tolerance of another swing low"
    strength_grade: "dim (0-5) | mid (6-12) | vivid (13-20)"

  L2_usage:
    # PENDING OLYA SESSION
    placeholder: true

# ═══════════════════════════════════════════════════════════════════════════════
# INTERNAL LIQUIDITY MAP — Session Box Architecture
# Olya session 2026-03-05, advisor review + CTO refactor 2026-03-05.
# ═══════════════════════════════════════════════════════════════════════════════
#
# SCOPE:
#   IN SCOPE:  detect ranges, classify BOX vs TREND, emit levels,
#              track price interactions (raw facts per level)
#   OUT OF SCOPE: sweep detection, displacement logic, FVG logic,
#                 trade entry rules
#
# PRINCIPLE: The liquidity layer detects and classifies.
#   Sweep detection is a cross-primitive event (liquidity level +
#   displacement/wick interaction + return). That belongs in the
#   Liquidity Sweep primitive (strategy layer), not here.
#
# CLASSIFICATION: Four-gate model.
#   CONSOLIDATION_BOX requires ALL FOUR gates:
#     1. range_pips <= max_range (per session type)
#     2. efficiency <= 0.60
#     3. mid_cross_count >= 2 (rotation proof)
#     4. balance_score >= 0.30 (time distribution proof)
#   TREND_OR_EXPANSION if ANY ONE gate fails.
#
# ═══════════════════════════════════════════════════════════════════════════════

SESSION_LIQUIDITY:

  definition: |
    Session extremes form the primary internal liquidity map.
    Three session windows produce BOX OBJECTS with four-gate classification.
    Remaining sessions (London, NY) produce deterministic H/L reference levels.

  classification:

    gates:
      range_cap: "per session type — Asia ≤30, Pre-London ≤15, Pre-NY ≤20"
      efficiency:
        threshold: 0.60
        formula: "abs(close_last - open_first) / (high - low)"
        note: |
          Unified across all sessions. Loosened from 0.45/0.50 to 0.60
          because wick taps can inflate net_move in otherwise choppy sessions.
          The tighter mid_cross and balance gates compensate.
      mid_cross_count:
        threshold: 2
        formula: |
          count bars where:
            (close[i-1] < mid AND close[i] > mid) OR
            (close[i-1] > mid AND close[i] < mid)
        note: |
          Rotation proof. Price oscillated around midpoint at least twice.
          A trending session that respects mid and grinds away won't cross
          it twice. Catches one-sided grinds the efficiency gate misses.
      balance_score:
        threshold: 0.30
        formula: "min(count(close > mid) / total, count(close < mid) / total)"
        note: |
          Time distribution proof. Price spent meaningful time both above
          and below mid. Catches sessions that briefly touch one extreme
          then spend 80% of time at the other — not balanced liquidity.

    CONSOLIDATION_BOX:
      condition: "ALL FOUR gates pass"
      display: "Shaded box + solid H/L/Mid lines extending to day end"
    TREND_OR_EXPANSION:
      condition: "ANY ONE gate fails"
      display: "Dashed H/L lines only, muted color, no box shading"
      trend_direction: "UP if close_last > open_first, DOWN otherwise"

  interaction_layer:
    definition: |
      Raw price events tracked per level after session window closes.
      Four events per level — objective facts, no sweep interpretation.
      These become inputs for the Liquidity Sweep primitive (L2).
    events_per_level:
      traded_above: "any bar.high > level — wick reached above"
      traded_below: "any bar.low < level — wick reached below"
      closed_above: "any bar.close > level — closed above"
      closed_below: "any bar.close < level — closed below"
    tracking: |
      For each of: Asia_High, Asia_Low, PreSession_High, PreSession_Low
      Record: occurred (bool) + first_time (bar reference)
      Scan: from session window close to forex day end, 1m bars.
    cto_note: |
      The interaction events (traded_above, closed_above etc.) become
      the inputs the Liquidity Sweep primitive will consume. This is
      the clean handoff point between detection layer and strategy layer.
      Sweep = traded_above + closed_below (for High) combined with
      displacement confirmation — that's L2, not here.

  box_objects:

    ASIA_BOX:
      window: "19:00-00:00 NY"
      pseudocode: |
        asia_bars = bars where time in [19:00 NY, 00:00 NY)
        h = max(bar.high), l = min(bar.low), mid = (h + l) / 2
        range = (h - l) / pip
        eff = abs(bars[-1].close - bars[0].open) / (h - l)
        mid_crosses = count close-crosses-mid transitions
        balance = min(count(close > mid), count(close < mid)) / total
        is_consol = range <= 30 AND eff <= 0.60 AND mid_crosses >= 2 AND balance >= 0.30
      range_cap: 30
      status: "PROPOSED — four-gate model, pending Olya visual recheck"

    PRE_LONDON_BOX:
      window: "00:00-02:00 NY"
      range_cap: 15
      note: "Same four-gate classification, tighter range for short window."
      status: "PROPOSED"

    PRE_NY_BOX:
      window: "05:00-07:00 NY"
      range_cap: 20
      note: "Pre-NY captures London drift. 20 pip balances tight vs reasonable."
      status: "PROPOSED"

  output_object: |
    All metrics emitted regardless of classification (Olya sees reasoning):
      {type, forex_day, start_time, end_time, high, low, mid,
