# ═══════════════════════════════════════════════════════════════════════════════
# TIER 2: EQL/EQH — DEFERRED
# Status: DEFERRED — superseded by Session Box model (2026-03-05)
# Retained for reference. Not active in pipeline or tool display.
# Revisit post-calibration if CTO wants LTF EQL/EQH outside session windows.
# ═══════════════════════════════════════════════════════════════════════════════

EQUAL_HL:

  architecture_note: |
    Tier 2 refinement. NOT a standalone primitive.
    Only operates within session context windows:
      - Asia box (19:00-00:00 NY)
      - Pre-London window (00:00-02:00 NY)
      - Pre-NY window (05:00-07:00 NY)
    Outside these windows: no EQL/EQH detection.
    Session Liquidity Objects (Tier 1) are the primary map.

  L1_detection:
    definition: |
      Two or more fractal pivots at approximately the same price
      within a session window = internal stop pool. Independent
      fractal detector (left=2, right=2), gated to session context.

    pivot_detection:
      method: "fractal pivot"
      left: 2
      right: 2
      note: "Independent of main swing N. Dedicated EQL/EQH pivots."

    session_gate: |
      EQL/EQH detection only runs within these windows:
        Asia box:       19:00-00:00 NY
        Pre-London:     00:00-02:00 NY
        Pre-NY:         05:00-07:00 NY
      Pivots outside these windows are ignored.
      Pairs must have BOTH touches within the same window.

    pseudocode: |
      for each session_window in [asia_box, pre_london, pre_ny]:
          window_bars = bars where time in session_window
          window_pivots = detect_fractal_pivots(window_bars, left=2, right=2)
          atr_14 = ATR(window_bars, period=14)
          tol = max(2.0 * PIP, 0.1 * atr_14)

          for each pair (pivot_a, pivot_b) where type matches:
              if abs(pivot_a.price - pivot_b.price) > tol:
                  continue
              if time_between(pivot_a, pivot_b) > max_time_proximity:
                  continue

              pullback = max_retrace_between(pivot_a, pivot_b, window_bars)
              if pullback < max(pullback_floor * PIP, 0.2 * atr_14):
                  continue

              touches = count_touches_at_level(pivot_a.price, window_pivots, tol)

              pool = LiquidityPool(
                  type=EQH or EQL,
                  timeframe=tf,
                  role=INTERNAL_STOP_POOL,
                  window=session_window.name,
                  touches=touches,
                  price_width=pip_diff,
                  avg_price=avg,
              )

  L15_parameters:
    tolerance:
      default: "adaptive"
      fixed_floor: 2.0  # pips — tighter than Tier 1 standalone (was 5.0)
      atr_factor: 0.1
      formula: "max(2.0 pip, 0.1 * ATR_14)"
      status: "PROPOSED"

    time_proximity:
      per_tf:
        1m: 60    # minutes
        5m: 240   # minutes
        15m: 720  # minutes
      note: "Maximum time between touches within a session window."
      status: "PROPOSED"

    pullback:
      pip_floor: 5  # pips — lower than standalone (was 10)
      atr_factor: 0.2
      formula: "max(5 pip, 0.2 * ATR_14)"
      note: "Within-session pullback is naturally smaller."
      status: "PROPOSED"

    touch_count:
      min_touches: 2
      flag_preferred: 3
      status: "PROPOSED"

  L1_tags:
    type: "EQH | EQL"
    role: "INTERNAL_STOP_POOL"
    window: "asia | pre_london | pre_ny"
    touches: "int"
    price_width: "float (pips)"
    quality: "HIGH | MID | LOW — derived by advisor"

  L2_usage:
    role: |
      EQL/EQH pools are stop-raid fuel for entries.
      Tier 1 session levels are the primary targets.
      Tier 2 pools refine WHERE within a session the stops cluster.
    status: "NOTED — Olya to elaborate post-calibration"

# ═══════════════════════════════════════════════════════════════════════════════
# TF_SCOPE — Two-Engine Architecture
# Documented explicitly per CTO + advisor review 2026-03-05.
# ═══════════════════════════════════════════════════════════════════════════════

TF_SCOPE:

  architecture: |
    Two separate engines, shared candle data:

    SESSION ENGINE (LTF: M1 / M5 / M15):
      Scope: Session liquidity boxes, four-gate classification
      Objects: Asia Box, Pre-London Box, Pre-NY Box
      Lifecycle: day-scoped, expires at forex day boundary
      Sweep model: interaction tracking only (raw facts per level)
      Sweep interpretation: deferred to Liquidity Sweep primitive (L2)

    HTF ENGINE (H1 / H4 / D1 / W1 / MN):
      Scope: Structural liquidity pools (EQH / EQL)
      Objects: LiquidityPool (fractal-clustered)
      Lifecycle: persist until traded_above/below (no expiry)
      Sweep model: status UNTOUCHED → SWEPT directly

  asymmetry_note: |
    HTF uses SWEPT status directly — at structural level, traded_above/below
    IS the definitive event. A weekly high from 3 months ago that gets traded
    through is categorically swept.

    Session engine uses interaction tracking only — session sweeps are more
    nuanced and require displacement confirmation. The strategy layer (Liquidity
    Sweep primitive) interprets session interactions as sweeps.

    This asymmetry is intentional. Document in dependency chain:
      HTF pool → traded_above/below → status: SWEPT (detection layer)
      Session level → interaction events → Liquidity Sweep primitive (strategy layer)

  htf_structural_types: |
    EQH, EQL, Swing_High, Swing_Low, Previous_High, Previous_Low

  status: "DOCUMENTED — architectural decision, not a parameter"

# ═══════════════════════════════════════════════════════════════════════════════
# HTF LIQUIDITY MODEL — LOCKED (Olya confirmed 2026-03-05)
# SwingPoint-sourced, invalidation-aware, tighter tolerance, Asia-filtered.
# ═══════════════════════════════════════════════════════════════════════════════

HTF_LIQUIDITY_MODEL:

  definition: |
    Structural EQH/EQL pools derived EXCLUSIVELY from confirmed SwingPoint output.
    NOT from raw candle extremes — a raw wick is not a swing.
    Dependency chain: bars → SwingPoints (fractal left=2 right=2) → HTF EQH/EQL.

    KEY PRINCIPLE: A pool becomes a valid liquidity object only when the second
    touch confirms it. The first touch establishes the level; the second touch
    proves the market respects it. In live operation, the pool enters Olya's
    trading logic at second-touch confirmation time.

    Display shows the level from first touch (origin) but the pool is not
    actionable until the second touch.

  detection_source: |
    EQH pools built from confirmed SwingHigh points ONLY.
    EQL pools built from confirmed SwingLow points ONLY.
    A raw bar.high/bar.low is NOT a valid touch. Must be a confirmed
    fractal pivot (left=2, right=2) first.

  L1_detection:

    swing_detection:
      method: "fractal pivot, left=2, right=2"
      rule: "Apply per TF natively (H1 bars for H1, D1 bars for D1)"

    price_tolerance:
      method: "fixed pip per TF — no ATR scaling on tolerance"
      per_tf:
        H1: 2 pip
        H4: 3 pip
        D1: 5 pip
        W1: 10 pip
        MN: 15 pip
      rationale: |
        Tighter fixed tolerance prevents a swing from being consumed
        by a distant pool that then gets invalidated, losing the correct
        pairing. The Wed 09:00 + Thu 10:00 EQL (1.9pip apart) was missed
        by 4pip tolerance because the Wed swing got pulled into an earlier
        pool 3.4pip away. 2pip fixed isolates it correctly.
        Olya confirmed 2026-03-05: these values produce clean ICT-style levels.

    separation_rules:
      min_bars_between_touches:
        H1: 6
        H4: 3
        D1: 2
        W1: 2
        MN: 2
      rotation_required:
        H1: "max(5 pip, 0.25 × ATR_H1)"
        H4: "max(8 pip, 0.25 × ATR_H4)"
        D1: "max(12 pip, 0.25 × ATR_D1)"
        W1: "max(20 pip, 0.25 × ATR_W1)"
        MN: "max(30 pip, 0.25 × ATR_MN)"
      note: "ATR scaling retained on rotation only — regime-appropriate pullback."

    max_lookback:
      H1: 500
      H4: 300
      D1: 180
      W1: 104
      MN: 60

    asia_range_filter: |
      Swings inside the same Asia box (same forex_day, session=asia) must NOT
      be compared with each other for EQH/EQL. Intra-Asia-box pivots are
      session noise, not structural liquidity.
      Asia swing vs external swing: ALLOWED.
      External swing vs external swing: ALLOWED.

    invalidation_during_formation: |
      If price trades THROUGH the pool level between consecutive touches
      (excluding touch bars), the pool is invalidated and never emits.
        EQH invalidated: any bar.high > pool_price + tolerance
        EQL invalidated: any bar.low  < pool_price - tolerance
      Tolerance buffer prevents micro-noise within the equality zone from
      triggering false invalidation. Price within tolerance of the level
      is "at the level", not "through it".

    clustering_sequence: |
      For each new confirmed SwingPoint:
        1. Find ALL candidate pools: same TF, same side, within tolerance
        2. Sort candidates by distance (nearest first)
        3. Try each candidate in order:
           a. Check Asia filter (both in same Asia box → skip)
           b. Check min_bars_between gate
           c. Check rotation gate (pullback between touches)
           d. Check invalidation (price through level between touches)
              If invalidated → mark pool dead, try NEXT candidate
           e. All gates pass → add touch, update price to median
        4. If no candidate survives → start new pool
      Critical: when a candidate is invalidated, the algorithm tries the
      next candidate rather than immediately starting a new pool. This
      prevents a dead pool from blocking a valid pairing.

    merge_overlapping: |
      Pools same TF/side within 1.5 × tolerance: merge.
      merged_price = weighted median. merged_touches = sum.

  emission:
    min_touches: 2
    preferred: "3+ (stronger signal)"

  output_object: |
    EqualPool:
      type: EQH | EQL
      tf: H1 | H4 | D1 | W1 | MN
      price: float (median of touch prices)
      touches: int
      first_touch_time: datetime (level origin — display starts here)
      last_touch_time: datetime (pool confirmed — actionable from here)
      status: UNTOUCHED | TAKEN
      taken_time: datetime | null
      touch_prices: float[]
      tags: [HTF_STRUCTURAL]

  lifecycle: |
    FORMATION: first touch establishes level, subsequent touches confirm pool.
               Pool is actionable from second touch onward.
               Invalidation during formation kills the pool — it never emits.
    UNTOUCHED: pool formed correctly, price has not traded through after last touch.
    TAKEN: price traded through the pool after full formation:
           EQH: bar.high > pool_price after last touch
           EQL: bar.low < pool_price after last touch
    Pools do NOT expire. Valid until TAKEN.

  calibration_data: |
    Final results — Olya confirmed 2026-03-05 (Jan 7-12 2024 EURUSD):
    H1: 120 bars, 34 swings → 3 pools (2 untouched, 1 taken)
    H4:  31 bars,  9 swings → 1 pool  (1 untouched, 0 taken)

    H1 EQL 2x @ 1.09322 UNTOUCHED (Wed 09:00 → Thu 10:00) — OLYA CONFIRMED
    H1 EQH 2x @ 1.09870 UNTOUCHED (Thu 21:00 → Fri 10:00)
    H1 EQL 2x @ 1.09494 TAKEN (Mon 13:00 → Mon 19:00, taken Tue 00:00)
    H4 EQH 2x @ 1.09870 UNTOUCHED (Thu 20:00 → Fri 08:00)

    Olya's visual check: "The ONLY EQL/EQH I see as a clear signal in this
    dataset is the low on Wed 10 09:00 + Thu 11 10:00." System now finds
    exactly this pool. Previous iterations produced 13 (v1) and 5 (v2) pools
    including false positives. Final v3 produces 4 pools, 0 false positives.

  display: |
    htf.html — horizontal lines per pool, colour by TF:
      H1: cyan | H4: orange | D1: yellow | W1: white | MN: purple
    UNTOUCHED: vivid solid line | TAKEN: muted dashed line
    Line renders from first_touch_time forward (level origin visible).
    Pool is actionable from last_touch_time (second touch confirms).
    Sidebar: pool cards with price, type, touches, status, touch times.
    TF toggle checkboxes to show/hide each layer.

  status: "LOCKED — Olya visually confirmed 2026-03-05. Produces exactly the pools she identifies."

# ═══════════════════════════════════════════════════════════════════════════════
# PRIMITIVE: ASIA RANGE
# Status: PENDING CALIBRATION (expected fast lock)
# ═══════════════════════════════════════════════════════════════════════════════

ASIA_RANGE:

  L1_detection:
    definition: |
      High and low of the Asia session. Classification as
      TIGHT or WIDE relative to threshold.

    pseudocode: |
      asia_bars = bars where time in [19:00 NY, 00:00 NY)
      asia_high = max(bar.high for bar in asia_bars)
      asia_low  = min(bar.low  for bar in asia_bars)
      asia_range = (asia_high - asia_low) / pip_value
      if asia_range < 10:
          classification = TIGHT
      elif asia_range <= 20:
          classification = MID
      else:
          classification = WIDE

    timeframe_note: |
      1m bars correct here — capturing true session extremes.
      Unlike FVG/Swing, Asia Range is a session-level measurement,
      not a pattern across consecutive bars.

  L15_parameters:
    classification:
      tight: "< 10 pip — low volatility, LOKZ setup quality HIGH"
      mid: "10-20 pip — tradeable with caution"
      wide: "> 20 pip — high volatility, skip LOKZ per v0.4 rule"
      rationale: |
        Three-tier replaces binary TIGHT/WIDE from v0.4.
        Calibration data: Wed 10.3, Thu 12.0 = clearly TIGHT.
        Mon 20.7, Fri 22.2 = clearly WIDE. Tue 17.7 = MID zone.
        10 pip and 20 pip are the natural break points.
      status: "LOCKED — Olya confirmed 2026-03-13"
      provenance: "Olya visual review of asia.html threshold slider, 2026-03-13"
    max_cap:
      value: 30  # pips
      note: "Olya confirmed in v0.3 — LOCKED. Beyond 30 pip = anomaly."
    efficiency_filter:
      value: 0.60
      formula: "abs(close_end - open_start) / (asia_high - asia_low)"
      note: |
        Unified to 0.60 across all sessions (2026-03-05 advisor review).
        Loosened from 0.45 because wick taps inflate net_move in choppy
        sessions. Compensated by mid_cross_count and balance_score gates
        added in SESSION_LIQUIDITY four-gate classifier.
        Works orthogonally with TIGHT/MID/WIDE classification.
      status: "PROPOSED — part of four-gate model, pending Olya recheck"
    v04_value: 30  # was too restrictive — all 5 sample days classified TIGHT
    calibration_data: |
      Mon: 20.7 pip → WIDE
      Tue: 17.7 pip → MID
      Wed: 10.3 pip → TIGHT
      Thu: 12.0 pip → MID (borderline tight)
      Fri: 22.2 pip → WIDE

  L1_tags:
    classification: "TIGHT | MID | WIDE"
    range_pips: "float"

  L2_usage:
    tight_session: |
      Consolidation — clean LOKZ setup expected.
      Liquidity pools (Asia H/L) become LOKZ sweep targets.
    mid_session: |
      Moderate range — LOKZ tradeable with caution.
      Direction may be partially expressed. Watch for sweep confirmation.
    wide_session: |
      Direction already expressed — LOKZ may not produce clean sweep.
      v0.4 rule: skip LOKZ if wide. Olya to confirm if still applies.

# ═══════════════════════════════════════════════════════════════════════════════
# PRIMITIVE: DISPLACEMENT
# Status: PENDING CALIBRATION
# ═══════════════════════════════════════════════════════════════════════════════

DISPLACEMENT:

  L1_detection:
    definition: |
      A 1-3 candle impulse sequence showing unusual directional conviction.
      Single candle is the canonical form; 2-3 bar clusters capture
      institutional moves that unfold across multiple bars.

    single_bar_pseudocode: |
      atr_14 = ATR(bars, period=14)
      body = abs(bar.close - bar.open)
      range = bar.high - bar.low
      body_pct = body / range
      atr_ratio = range / atr_14
      direction = BULLISH if bar.close > bar.open else BEARISH

    cluster_pseudocode: |
      For span in [1, 2, 3]:
        sequence = bars[i : i+span]
        all bars must have same direction (all bullish or all bearish)
        combined_range = max(highs) - min(lows)
        combined_body  = abs(close[last] - open[first])
        body_pct       = combined_body / combined_range
        atr_ratio      = combined_range / atr_14
      Pick best (largest) qualifying span.
      Bars consumed by a cluster cannot start new displacements.
      Tag: displacement_type = SINGLE | CLUSTER_2 | CLUSTER_3

    close_location_gate: |
      OPTIONAL third condition (toggleable in tool):
      Final bar of sequence must close in the extreme 25% of its range.
        Bullish: (high - close) / (high - low) <= 0.25 (close in top 25%)
        Bearish: (close - low) / (high - low) <= 0.25 (close in bottom 25%)
      Filters out bars with clean bodies but weak closing conviction.
      For clusters: applied to the FINAL candle of the sequence.

    quality_scoring: |
      Every displacement event tagged with quality grade:
        STRONG: atr_ratio >= 2.0
        VALID:  atr_ratio >= 1.5 (and < 2.0)
        WEAK:   atr_ratio >= 1.25 (and < 1.5)
      Downstream consumers (MSS, OB) can filter by grade.
      Chart display: colour-coded by grade.

    fvg_cross_reference: |
      ICT teaches: true displacement SHOULD create FVG.
      Tag each displacement: created_fvg = bool
      At proposed defaults + close gate: ~25% create FVG on 5m.

  L15_parameters:

    two_tier_thresholds: |
      Clean two-tier model replaces per-TF table.

      LTF (M1 / M5 / M15):           LOCKED — Olya confirmed 2026-03-05
        atr_multiplier:  1.50
        body_ratio:      0.60
        close_gate:      0.25

      HTF (H1 / H4 / D1 / W1 / MN):  PROPOSED — pending HTF visual session
        atr_multiplier:  1.50
        body_ratio:      0.65  (stricter — HTF bars carry more noise)
        close_gate:      0.25
        structure_close_required: true

      structure_close_required (HTF only):
        Displacement bar close must be BEYOND the most recent opposing
        swing point in the direction of the move.
          Bullish: bar.close > prior_swing_high.price
          Bearish: bar.close < prior_swing_low.price
        Uses SwingPoint output (LOCKED) as reference — not raw price.
        Dependency: SwingPoints → HTF Displacement structure_close check.
        If no qualifying swing within lookback: tag UNANCHORED,
        do not suppress — let strategy layer decide.

      LTF: structure_close_required: false
        Close gate alone sufficient at LTF resolution.

      Rejected alternative: close_gate 0.20 + ATR 1.6 considered, rejected —
      close 0.20 too demanding for HTF aggregation, ATR 1.6 marginal gain
      insufficient to justify added complexity. Clean > optimal.

    heatmap_candidates:
      atr_multipliers: [1.0, 1.25, 1.5, 2.0]
      body_ratios: [0.55, 0.60, 0.65, 0.70]
      note: "4x4 heatmap available for exploration around locked defaults."

    combination_mode: AND
    close_location_gate: "ON (canonical baseline, toggleable in tool)"

  decisive_override_path: |
    Secondary qualification for single candles that fail ATR gate but show
    decisive price action. Stricter body/close requirements, no ATR needed.
    Designed as narrow exception — 1-3% fire rate in production.

    Requirements (ALL must pass):
      displacement_type == SINGLE (clusters cannot use override)
      body_ratio >= 0.75 (stricter than primary path)
      close_location <= 0.10 (extreme close — top/bottom 10%)
      range_pips >= pip_floor:
        M1: 3.0  |  M5: 5.0  |  M15: 6.0
        H1: 8.0  |  H4: 15.0  |  D1: 20.0

    Design rationale:
      Solves the expanded-ATR regime problem. A 6.7pip bar with 0.79 body
      closing at the extreme IS displacement — but if ATR expanded to 6.35pip,
      the ATR gate says "normal". The override path catches these with tighter
      conviction requirements. The pip floor prevents noise in low-vol regimes.

    Scope: LTF override LOCKED. HTF override pip floors (H1:8, H4:15, D1:20)
    PROPOSED pending HTF visual session.

    Logging: every event tagged qualification_path = ATR_RELATIVE | DECISIVE_OVERRIDE
    Production monitoring: if override fires >10% something is wrong.

  evaluation_order: |
    1. check_cluster_2 (cluster_3 disabled)
       Only takes precedence if cluster passes close gate.
       If cluster fails close gate → bar falls through to single.
    2. check_single_atr_relative (primary path)
    3. check_single_decisive_override (secondary path)

  cluster_restrictions: |
    CLUSTER_3: DISABLED entirely.
    CLUSTER_2: ALLOWED with ALL FOUR filters:
      1. Net displacement efficiency >= 0.65
      2. Internal overlap <= 0.35
      3. Directional progression + same direction bodies
      4. Close strength on final bar (per TF threshold)
    Cluster only takes precedence if it passes close gate.
    Otherwise bar i evaluated as single (may qualify via override).

  calibration_workflow: |
    Step 1: Validate single-candle at TF defaults + close gate ON (baseline)
    Step 2: Check override events — should be 1-3% of total, not noise
    Step 3: Toggle cluster_2 ON — assess if additional events add value
    Step 4: Cluster_3 stays disabled until steps 1-3 locked

  L1_tags:
    session: "asia | lokz | nyokz | other"
    created_fvg: "bool"
    ny_window: "WinA (08-09) | WinB (10-11) | none"
    atr_ratio: "float"
    body_pct: "float"
    displacement_type: "SINGLE | CLUSTER_2"
    close_location_pass: "bool"
    quality_grade: "STRONG (>=2.0x) | VALID (>=1.5x) | WEAK (>=1.25x)"
    qualification_path: "ATR_RELATIVE | DECISIVE_OVERRIDE"
    cluster_net_eff: "float (cluster_2 only)"
    cluster_overlap: "float (cluster_2 only)"

  calibration_data: |
    At TF-scaled defaults, single candles + close gate + override (Jan 7-12 EURUSD):
    M1:  2264 ATR + 13 OVR = 2277 total (1% override)
    M5:   454 ATR +  6 OVR =  460 total (1% override)
    M15:  143 ATR +  5 OVR =  148 total (3% override)
    Override fire rate 1-3% — well within narrow exception target.
    Key override capture: Jan 9 15m 05:30 bear (ATR=1.05x, body=0.79, close=0.02, 6.7pip).

  deferred: |
    CLUSTER_3: disabled, re-enable after single + cluster_2 validated.
    OVERLAP REDUCTION: park for post-session. Conceptually valid, adds complexity.

  calibration_principle: |
    HIGHEST SIGNAL OVER EXHAUSTIVE DETECTION.
    Some visually identifiable moves will be missed at locked thresholds.
    This is accepted in exchange for a clean, low-noise signal stream.
    Confluence-first model: quality of detected events > quantity.
    A move that exists on 5m but not 15m is a 5m signal — the 15m
    aggregation telling the truth about intra-bar rotation.

  L2_usage:
    placeholder: true
    note: "Displacement is the quality gate for MSS and OB."

# ═══════════════════════════════════════════════════════════════════════════════
# PRIMITIVE: MSS (Market Structure Shift)
# Status: PENDING CALIBRATION
# ═══════════════════════════════════════════════════════════════════════════════

MSS:

  architecture_principle: |
    MSS is a COMPOSITE primitive — it consumes locked outputs from
    SwingPoints, Displacement, and FVG. It does not re-derive from raw candles.
    BOS is NOT a separate detector — it's MSS with break_type = CONTINUATION.

  L1_detection:
    definition: |
      Close beyond a prior swing point WITH displacement on the break bar.
      Two conditions must be met simultaneously:
        1. Swing break: bar.close beyond most recent opposing SwingPoint (close only, not wick)
        2. Displacement: break bar qualifies via locked displacement detector

    swing_break:
      bullish: "bar.close > most_recent_swing_high.price"
      bearish: "bar.close < most_recent_swing_low.price"
      source: "SwingPoint output (LOCKED). All detected swings qualify — no strength gate."
      close_only: "Wick touches do NOT trigger MSS. Close is required."

    displacement_requirement:
      inherits: "Displacement detector (LOCKED)"
      paths: "ATR_RELATIVE or DECISIVE_OVERRIDE — both valid for MSS"
      note: "MSS quality = displacement quality. No independent MSS threshold."

    break_classification:
      REVERSAL: "Break against prior trend. Internal tag only."
      CONTINUATION: "Break with prior trend. Internal tag only."
      bos_handling:
        separate_primitive: false
        separate_detector: false
        user_visible_label: false
      note: |
        All structure breaks display as "MSS" to the user.
        break_type (REVERSAL | CONTINUATION) retained as internal tag
        in JSON output for data/research. Not shown on chart.
        One detector, one visible label, two internal tags.

    fvg_handling:
      gate: false
      tag: "fvg_created: true | false"
      rationale: |
        FVG creation tagged but NOT required. Some genuine structure shifts
        occur on displacement bars that don't create an FVG (sub-floor gap,
        prior wick coverage). FVG tag lets L2 filter if desired.
        v0.4 "FVG created OR respected" was too loose. TAG ONLY is cleaner.

  confirmation_window: |
    MSS detection uses a break-first, confirm-with-displacement model.
    1. Detect FIRST bar that CLOSES beyond the relevant swing (the break bar).
    2. Open a 3-bar confirmation window from the break bar.
    3. Search for displacement (same direction) on break bar or within window.
       Also checks 1 bar back for clusters that straddle the break.
    4. If displacement found: MSS CONFIRMED. Anchor = break bar.
    5. If no displacement within window: break consumed, no MSS for this swing.
    6. output.window_used = displacement bar - break bar (0=same bar, 1-3=confirmed later).

    Design rationale:
      Slow drift through a swing without displacement is NOT a structure shift.
      A break that produces displacement within 3 bars IS a structure shift.
      Prevents late-drift MSS (e.g. 6 bars of grinding then displacement).

    confirmation_window_size: 3

  anchor_rule: |
    MSS anchors to the BREAK BAR (first close beyond swing), not the
    displacement bar. The structure shifted when the close occurred;
    displacement confirms the conviction.
    For clusters straddling the break: anchor = break bar, displacement
    may start 1 bar earlier (window_used = -1).

  impulse_suppression: |
    After MSS fires, detector enters SUPPRESSION state.
    Bars within the confirming displacement cluster are excluded from
    suppression pullback checks (prevents micro-resets within the cluster).

    Reset conditions (any one exits suppression):
      1. PULLBACK RESET: price retraces >= max(5pip, 0.25*ATR) from extreme
      2. OPPOSITE DISPLACEMENT: displacement in opposite direction
      3. NEW DAY: forex day boundary

    Swing consumption: once a swing is broken (with or without displacement
    confirmation), it is consumed and cannot trigger another MSS. Each swing
    breaks once.

  dependency_chain:
    SwingPoints: "LOCKED → MSS swing reference (breakable levels)"
    Displacement: "LOCKED → MSS displacement gate (break bar conviction)"
    FVG: "LOCKED → MSS fvg_created tag (confluence signal)"
    downstream: "MSS → feeds OTE anchor, OB detection"

  output_object: |
    MSS_Event:
      direction:      BULLISH | BEARISH
      break_type:     REVERSAL | CONTINUATION
      broken_swing:   {type, price, time}
      displacement:   {atr_multiple, body_ratio, quality_grade, path, displacement_type}
      fvg_created:    true | false
      timeframe:      M1 | M5 | M15 | H1 | H4 | D1
      session:        asia | lokz | nyokz | other
      forex_day:      string

  display: |
    swings.html "Show MSS" toggle (pipeline data):
      All events: vivid marker (cyan bull / red bear), label "MSS"
      FVG-tagged: star appended "MSS★"
      visible_event_name: MSS (all breaks, no BOS label shown)

  calibration_data: |
    Jan 7-12 2024 EURUSD (after anchor fix + impulse suppression):
    5m:  40 total (17 REV, 23 CONT, 22 FVG = 55%) — was 88 before fixes
    15m: 17 total ( 8 REV,  9 CONT, 13 FVG = 76%) — was 26 before fixes
    1m: 160 total (82 REV, 78 CONT, 87 FVG = 54%) — was 447 before fixes
    Final (confirmation window + cluster break fix + suppression):
    5m:  44 total (20 REV, 24 CONT, 35 FVG = 80%)  — per day: 4-13
    15m: 20 total (10 REV, 10 CONT, 17 FVG = 85%)  — per day: 2-8
    1m: 179 total (88 REV, 91 CONT, 129 FVG = 72%)
    Window usage (5m): 50% same-bar, 32% cluster-straddle, 18% window 1-3 bars.
    Drift MSS eliminated. Duplicate MSS in impulse legs eliminated.

  two_tier_mss:

    LTF (M1 / M5 / M15):                           LOCKED — Olya confirmed 2026-03-05
      displacement_required: true
      displacement_body_ratio: 0.60
      confirmation_window_bars: 3
      close_beyond_swing: "bar.close required (not wick)"
      impulse_suppression: "pullback reset, opposite displacement, or new day"
      cluster_support: "cluster_2 can straddle break bar (window_used = -1)"

    HTF (H1 / H4 / D1 / W1 / MN):                  PROPOSED — pending HTF visual session
      displacement_required: true
      displacement_body_ratio: 0.65
      confirmation_window_bars: 1
      close_beyond_swing: "bar.close required (not wick)"
      impulse_suppression: "stricter — same rules, tighter window"
      structure_close_required: true
      note: |
        HTF MSS uses HTF displacement tier (body 0.65, structure_close).
        Tighter 1-bar window reflects HTF bar significance — each bar is
        hours/days of price action, drift across bars is more meaningful.

  status: "LOCKED (LTF) — Olya confirmed 2026-03-05. HTF PROPOSED pending visual session."

  L2_usage:
    placeholder: true
    note: "MSS feeds OTE anchor selection and is the primary structure shift signal."

# ═══════════════════════════════════════════════════════════════════════════════
# PRIMITIVE: ORDER BLOCK (OB)
# Status: LOCKED — architecture (CTO) + parameters (Olya) confirmed 2026-03-07
# ═══════════════════════════════════════════════════════════════════════════════

ORDER_BLOCK:

  L1_detection:
    definition: |
      The last opposing candle before a displacement move that causes MSS.
      Zone defined by candle BODY only (execution zone).
      Full candle OHLC retained for invalidation logic only.
      Displacement alone is NOT sufficient — MSS required.

    trigger:
      rule: "displacement + MSS required — displacement alone insufficient"
      pseudocode: |
        if is_displacement(bars[i]) AND displacement_causes_mss(bars[i]):
            ob_candle = find_ob_anchor(bars, i)
            if ob_candle is not None:
                emit ORDER_BLOCK(
                    direction=displacement.direction,
                    execution_zone=[ob_candle.open, ob_candle.close],
                    full_candle_ohlc=[ob_candle.open, ob_candle.high,
                                     ob_candle.low, ob_candle.close],
                    displacement_grade=get_displacement_grade(bars[i]),
                    mss_ref=mss_event
                )
      rationale: |
        OB without MSS is an orphan zone with no structural context.
        ICT teaches OB as the origin of a move that shifts structure.
        Displacement alone produces ~100/day on 5m — too noisy.
        Requiring MSS ties OB to structure shift = meaningful zone.

    displacement_anchor:
      primary: |
        Last opposing candle before displacement_cluster_start.
        For single-candle displacement: bars[i-1].
        For cluster_2: first bar of cluster, then bars[cluster_start - 1].
      fallback:
        mode: ENABLED_CONDITIONAL
        trigger: "Only activate if bars[i-1] is same-direction, neutral, or thin"
        lookback_bars: 3
        reject_if_none_found: true
        rationale: |
          Conditional prevents noise inflation — most OBs anchor to bars[i-1].
          Fallback fires when preceding candle doesn't oppose OR fails thin filter.
        status: "LOCKED — Olya confirmed 2026-03-07"

    thin_candle_filter:
      min_body_pct: 0.10
      formula: "abs(candle.close - candle.open) / (candle.high - candle.low)"
      on_reject: "continue backward scan — does NOT kill OB search"
      zero_range: "if high == low → body_pct = 0 → always rejected"
      rationale: |
        A 0.2pip doji in consolidation (body/range ≈ 0.02) is not a meaningful
        opposing candle. 10% body minimum ensures the candle had directional
        conviction. Rejected candles fall through to backward scan — a valid
        opposing candle within 3 bars can still anchor the OB.
      provenance: "Olya forensic review 2026-03-07 (Mon 06:50 false positive)"
      status: "LOCKED — Olya confirmed 2026-03-07"

      pseudocode: |
        def is_valid_ob_candle(candle, disp_direction):
            is_opposing = (
                (disp_direction == BEARISH and candle.close > candle.open) or
                (disp_direction == BULLISH and candle.close < candle.open)
            )
            if not is_opposing:
                return False
            candle_range = candle.high - candle.low
            if candle_range <= 0:
                return False
            body_pct = abs(candle.close - candle.open) / candle_range
            return body_pct >= 0.10

        def find_ob_anchor(bars, disp_start_idx):
            preceding = bars[disp_start_idx - 1]
            if is_valid_ob_candle(preceding, disp_direction):
                return preceding  # primary — no scan needed
            # Conditional fallback: scan back 3 bars
            for j in range(disp_start_idx - 1, max(disp_start_idx - 4, -1), -1):
                if is_valid_ob_candle(bars[j], disp_direction):
                    return bars[j]
            return None  # reject — no OB

    zone_definition:
      execution_zone:
        type: BODY_ONLY
        value: "[ob_candle.open, ob_candle.close]"
        options: [body]
        note: "Wick zone removed from execution. Body keeps primitive tight/clean."
        status: "LOCKED — Olya confirmed 2026-03-07"
      storage:
        full_candle_ohlc: "[ob_candle.open, ob_candle.high, ob_candle.low, ob_candle.close]"
        purpose: "Retained for invalidation logic only (close beyond full candle boundary)"
        note: "NOT used for entry, mitigation, or display — invalidation reference only"

    dependency: "[DISPLACEMENT, SWINGS, MSS]"

  L1_state_machine:
    states:
      ACTIVE:       "OB zone exists, price has not entered execution zone"
      MITIGATED:    "Price entered execution zone (body)"
      INVALIDATED:  "OB structurally dead — close beyond candle or opposite MSS"
      EXPIRED:      "Max age reached without mitigation or invalidation"

    transitions:
      ACTIVE → MITIGATED:
        bullish_ob: "bar.low <= ob.execution_zone_high"
        bearish_ob: "bar.high >= ob.execution_zone_low"
        track: "deepest_penetration_pct"
      ACTIVE → INVALIDATED:
        price_invalidation:
          bullish_ob: "bar.close < ob_candle.low (close beyond full candle)"
          bearish_ob: "bar.close > ob_candle.high"
          note: "Wick breach alone does NOT invalidate. Close required."
        structural_invalidation: "Opposite MSS fires after OB creation"
      ACTIVE → EXPIRED:
        trigger: "max_age_bars reached without mitigation or invalidation"
        role: "Secondary cleanup only — not the primary death mechanism"
      MITIGATED → INVALIDATED:
        same_rules: "price invalidation or structural invalidation"

    priority_of_death: |
      1. Price invalidation (close beyond full candle boundary)
      2. Structural invalidation (opposite MSS fires)
      3. Time expiry (max_age_bars — secondary cleanup only)

    tracking: |
      All state transitions logged with timestamp.
      Bead carries: [state, state_change_time, state_history[],
                     deepest_penetration_pct (if mitigated)]

  L15_parameters:
    expiration:
      method: max_age_bars_by_timeframe
      values:
        1m:  10
        5m:  10
        15m: 10
        1h:  15
        4h:  20
        1d:  20
      role: "Secondary cleanup (EXPIRED state) — not primary death mechanism"
      real_world_meaning:
        5m_10bars:  "50 minutes"
        15m_10bars: "2.5 hours"
        1h_15bars:  "15 hours"
        4h_20bars:  "~3.3 days"
      rationale: |
        TF-relative expiry respects HTF OB persistence.
        LTF (1m/5m/15m): 10 bars — tight cleanup, matches ICT's
        "five candles" guidance with conservative buffer.
        HTF (1h+): longer expiry — structural OBs persist longer.
      status: "LOCKED — Olya confirmed 2026-03-07"
      provenance: "Olya + Advisor visual review session 2026-03-07"
    zone_type:
      value: "body"
      options: [body]
      rationale: |
        Body only keeps primitive tight and clean.
        Wick zone removed from execution entirely.
        Full candle OHLC retained at L1 for invalidation logic only.
      status: "LOCKED — Olya confirmed 2026-03-07"
    fallback_scan:
      mode: ENABLED_CONDITIONAL
      trigger: "Only when bars[i-1] is same-direction, neutral, or fails thin filter"
      lookback_bars: 3
      reject_if_none_found: true
      rationale: |
        Conditional prevents noise inflation — most OBs anchor to bars[i-1].
        Scan fires when preceding candle doesn't oppose OR fails thin filter.
      status: "LOCKED — Olya confirmed 2026-03-07"
    thin_candle_filter:
      min_body_pct: 0.10
      on_reject: "continue backward scan"
      status: "LOCKED — Olya confirmed 2026-03-07"
    min_displacement_grade:
      inherits: "DISPLACEMENT L15 (ATR 1.5x, body 0.60, AND mode)"
      note: "OB without quality displacement is not meaningful"
      status: "LOCKED — inherits from displacement params"

  L2_usage:
    placeholder: true

# ═══════════════════════════════════════════════════════════════════════════════
# PRIMITIVE: LIQUIDITY SWEEP
# Status: CLEAN REBUILD — Curated Pool Architecture
# ═══════════════════════════════════════════════════════════════════════════════

LIQUIDITY_SWEEP:

  concept:
    definition: |
      Price breaches a known liquidity level and closes back inside
      within a return window. Sweep = breach + rejection + close back.
      Continuation = breach beyond 1.5x ATR (no return — separate classification).
      These are distinct events. Do not conflate.
    outcome_neutral: true
    outcome_neutral_note: |
      Reversal vs continuation classified at L2 via kill_zone + session_name
      + qualified_sweep tags. Primitive detects the raid event only.

  sweep_detection_scope:
    design_principle: |
      Sweep detection evaluates only pre-qualified main liquidity pools.
      The system does NOT evaluate sweeps against every historical swing
      or micro pivot. Only curated liquidity destinations are eligible.
      With ~15-20 active levels per day, candle logic stays simple:
      breach + close inside + reclaim distance. Everything else is
      downstream interpretation at L2.

  L1_detection:
    bearish_sweep:
      trigger: "bar.high > level.price (buy-side liquidity taken)"
      confirm: "bar.close < level.price (same-bar reclaim)"
      rejection_wick: "bar.high - max(bar.open, bar.close)"
      rejection_wick_pct: "rejection_wick / (bar.high - bar.low) >= 0.40"
      note: "Rejection wick filter applied to same-bar sweeps only"

    bullish_sweep:
      trigger: "bar.low < level.price (sell-side liquidity taken)"
      confirm: "bar.close > level.price (same-bar reclaim)"
      rejection_wick: "min(bar.open, bar.close) - bar.low"
      rejection_wick_pct: "rejection_wick / (bar.high - bar.low) >= 0.40"

    continuation:
      trigger: "breach_size > 1.5 x ATR(14)"
      classification: "Separate from sweep — no return expected"
      dedup: "One continuation per level per direction (first breach only)"

    evaluation_order: |
      Reclaim checked FIRST, ATR cap SECOND.
      1. Breach occurs (bar.high > level for bearish, bar.low < level for bullish)
      2. Check return window — does any bar close back inside within N bars?
      3. If YES → validate reclaim (min_reclaim + wick rejection) → SWEEP
         Regardless of breach size. A large breach that rejects = strong sweep.
      4. If NO valid reclaim → check ATR cap
         If breach > 1.5x ATR → CONTINUATION (level consumed as breakout)
         Otherwise → level remains (may be caught by dwell consumption)

    wick_measurement:
      same_bar_sweep: |
        Standard pin bar wick test (rw=1):
        bearish: (bar.high - max(bar.open, bar.close)) / (bar.high - bar.low)
        bullish: (min(bar.open, bar.close) - bar.low) / (bar.high - bar.low)
      multi_bar_sweep: |
        Synthetic wick (rw>1):
        synthetic_wick = reclaim_distance / (breach_distance + reclaim_distance)
        Measures "how much of the breach was given back" across the full pattern.
        Example: 03:00 breach 11.6pip, 03:15 reclaim 13.4pip → 13.4/25.0 = 53.6%
      threshold: 0.40
      status: "LOCKED — Olya confirmed 2026-03-11"

    marker_placement: |
      Sweep marker placed on the CONFIRMATION bar (the bar whose close
      proves the sweep), NOT the breach bar. At breach time, the system
      doesn't know if it's a sweep or continuation. The signal is actionable
      only when the reclaim close confirms it.
      Metadata carries both: breach_time + time (confirm bar).

    pseudocode: |
      for each bar in bars:
          for each level in curated_pool:
              if bar.time < level.valid_from_time: skip
              if level.state == SWEPT: skip
              if bar breaches level by < min_breach(tf): skip
              # 1. Check reclaim FIRST
              for j in return_window:
                  if bars[j].close reclaims level:
                      reclaim_distance = abs(bars[j].close - level.price)
                      if reclaim_distance < min_reclaim(tf): break
                      if rw == 1: wick = standard_pin_bar_wick
                      else: wick = reclaim_distance / (breach_distance + reclaim_distance)
                      if wick >= 0.40:
                          emit SWEEP(time=confirm_bar, breach_time=breach_bar)
                          mark level SWEPT
                      break
              # 2. No valid reclaim → check ATR cap
              if breach > 1.5 * ATR14:
                  emit CONTINUATION
                  mark level SWEPT  # continuations consume levels too
              # Mirror for opposite direction

    level_sources:
      curated_pool:
        PDH_PDL: "Locked reference levels (17:00 NY boundary)"
        ASIA_H_L: "Asia session box boundaries (valid after 00:00 NY)"
        LONDON_H_L: "LOKZ session box boundaries (valid after 05:00 NY)"
        LTF_BOX: "Session/pre-session box H/L (valid after box.end_time)"
        HTF_EQH: "From HTF_LIQUIDITY_MODEL (LOCKED) — structural H1/H4 equal highs"
        HTF_EQL: "From HTF_LIQUIDITY_MODEL (LOCKED) — structural H1/H4 equal lows"
        PWH: "Previous week high (valid from Monday 17:00 NY)"
        PWL: "Previous week low (valid from Monday 17:00 NY)"
        PROMOTED_SWING: |
          Swing points promoted into main pool via concrete gate:
            strength >= 10 AND height_pips >= 10.0 AND current forex day only.
          Strength 10 = vivid grade in taxonomy — swings Olya can SEE.
          Current-day-only prevents stale swings generating false sweep events.
        SWEEP_EVENT: |
          Sweep event levels — created dynamically when a qualified sweep confirms.
          The sweep extreme (bar.low for bullish, bar.high for bearish) becomes
          a new liquidity target eligible for future sweep detection.
          Pattern: sweep A creates level → sweep B takes that level (sweep-of-a-sweep).
          Olya confirmed this is a pattern she trades (Oct 1 06:30 investigation).
          Config:
            enabled: true
            max_recursion_depth: 2  (sweep-of-sweep-of-sweep capped)
            max_age_sessions: 3    (expires after 3 forex session boundaries)
          Creation ordering (prevents self-consumption):
            step 1: confirm sweep
            step 2: consume crossed prior levels (pass-through)
            step 3: create new SWEEP_EVENT level (enters pool AFTER consumption)
          Temporal guard: level.valid_from = confirm bar close time.
          Recursion: parent.depth + 1; if depth would exceed max, no level created.
          Status: LOCKED — 2026-03-12 (Olya + CTO confirmed)
      excluded:
        raw_previous_swings: "Low-strength fractals create excessive noise"
        low_strength_fractals: "Micro-pivots not liquidity destinations"
        EQUAL_HL: "DEFERRED — raw LTF equal HL not finalized"
        LOKZ: "Timing context only — NOT a price level"
        NYOKZ: "Timing context only — NOT a price level"
        PRE_SESSION: "Not included — minor levels, noise sources"
      future_phase:
        PMH: "Previous month high — deferred until monthly data available"
        PML: "Previous month low — deferred"

    level_management:
      temporal_gating: "bar.time >= level.valid_from_time required before testing"
      temporal_guard_on_consumption: |
        LOCKED — 2026-03-12. Pass-through consumption ALSO checks
        level.valid_from <= bar.time before consuming. Prevents
        future-dated levels from being consumed before they exist.
        Investigation 5 (Oct 3 10:00) revealed lokz_H_2025-10-03
        being consumed on Sep 29 — now blocked by this guard.
      level_consumption:
        sweep: "marks level SWEPT (unchanged)"
        continuation: "marks level SWEPT (prevents phantom sweeps on blown-through levels)"
        consumed: "marks level CONSUMED via dwell rule (see dwell_consumption below)"
        probe_exhausted: |
          LOCKED — 2026-03-12. Marks level PROBE_EXHAUSTED when breached
          repeatedly without sweep confirmation. Complements dwell (which
          catches price staying beyond; probe catches repeated crossing
          without conviction).
          - threshold: 5 unresolved breaches (breach >= min_breach, all gates fail)
          - reset: counter resets after 3 consecutive bars without breach
          - action: consume level, add PROBE_EXHAUSTED to output
          - Investigation 7: Oct 1 Pre-NY High breached 7 times (08:15-09:45),
            now consumed at 09:15 (probe=5), eliminates false sweep at 10:00
      level_merging: |
        Nearby levels within 1.0 pip tolerance merged into single pool.
        LOCKED — 2026-03-12: Merge partitions by (side, forex_day) before
        proximity merge. Levels from different forex days NEVER merge, even
        if within tolerance. Preserves distinct session events (e.g.,
        asia_H Oct 1 at 1.17424 and asia_H Oct 2 at 1.17418 stay separate).
        HTF/PWH/PWL levels with empty forex_day merge normally within
        their own partition. Fixes Investigation 3 (asia_H Oct 2 missing)
        and Investigation 4 (Pre-NY Low Oct 3 missing).
      deduplication: "Levels grouped by (source, side, price±0.1pip)"

    provenance_fields: |
      Every sweep carries: source_level_type, source_level_id,
      timeframe_class (LTF|HTF), session_name, kill_zone,
      sources_merged (list), touch_count
    dependency: "[SESSION_LIQUIDITY, REFERENCE_LEVELS, HTF_LIQUIDITY_MODEL, SESSION_BOXES, SWING_POINTS]"
    source_architecture_status: "LOCKED — 2026-03-07 (clean rebuild)"

    sweep_target_tiering:
      principle: htf_liquidity_ltf_execution
      status: "LOCKED — 2026-03-12 (Olya confirmed)"
      description: |
        The system defines liquidity only from higher-timeframe or
        major reference levels. Lower timeframes are used only to
        detect the sweep more precisely and to execute trades.
        Lower timeframes must not generate their own liquidity pools.

      liquidity_pool_sources:
        - equal_highs
        - equal_lows
        - session_highs_lows
        - pdh
        - pdl
        - other_major_reference_levels
        - htf_promoted_swings

      timeframe_roles:
        htf_detection:
          timeframe: M15
          role:
            - monitor_main_liquidity_levels
            - detect_primary_sweep_events
        ltf_detection:
          timeframe: M5
          role:
            - observe_same_htf_liquidity_levels
            - detect_sweep_more_precisely
            - prepare_execution_context
        execution:
          timeframe: M2
          role:
            - confirm_displacement
            - refine_entry

      restrictions_on_ltf:
        m5_must_not_create_levels: true
        disallowed_liquidity_sources:
          - m5_promoted_swings
          - local_pivots
          - micro_swings
          - raw_candle_high_low

      expected_result: |
        Both M15 and M5 observe the same curated liquidity pool.
        M15 provides structure and main sweep detection.
        M5 refines the sweep and prepares execution.
        M2 is used purely for entry timing.
        Removing local M5 liquidity prevents noisy micro sweeps.

    cross_timeframe_cascade:
      status: "L2 — NOT in detection engine"
      principle: |
        L1 detection runs independently per timeframe against the curated pool.
        Each TF correctly detects sweeps of main liquidity on its native bars.
        Cross-TF signal flow (15m sweep triggers 5m execution) is L2 strategy,
        not L1 detection. L2 never rewrites L1.

      timeframe_roles:
        M15:
          role: "DETECT — primary sweep identification"
          output: "sweep signal with full metadata (time, level, direction, displacement)"
        M5:
          role: "EXECUTE — monitor HTF liquidity, confirm sweep behaviour, prepare entry"
          input: "inherits 15m sweep signal at L2"
          restriction: "must not create new liquidity targets (promoted swings excluded)"
        M2:
          role: "ENTRY — displacement confirmation, precise timing"
          input: "inherits execution context from M5"
          restriction: "no sweep detection, no liquidity targets"

      architectural_boundary: |
        Multiple M5 signals on the same HTF liquidity move are CORRECT L1 detections.
        Consolidating them into one setup is an L2 strategy decision (Olya's interpretation).
        Do not build consolidation, state machines, or interaction tracking into L1.

      confirmed_by: "Olya + CTO 2026-03-12"

  L15_parameters:
    return_window_bars:
      per_tf:
        M1: 2
        M5: 3
        M15: 4
      note: |
        Per-TF return window. Wider windows capture multi-bar sweep patterns
        where breach and reclaim occur on separate bars.
        Absorbs delayed_sweep (removed) — single sweep type covers all.
      status: "LOCKED — Olya confirmed 2026-03-11"
    directional_close:
      status: "REMOVED"
      rationale: |
        Phase 2 forensic (Jan 9 15m) proved directional close rejects genuine sweeps.
        Events 1 and 3 had strong rejection wicks but micro-opposite closes.
        Reclaim distance is the meaningful filter — directional close is redundant.
        Removed from pipeline code after forensic evidence.
    min_reclaim_distance:
      by_timeframe:
        "5m": 0.5
        "15m": 1.0
      note: "Pips — close must reclaim beyond level to confirm rejection"
      status: "LOCKED"
    min_breach:
      by_timeframe:
        "5m": 0.5
        "15m": 1.0
      note: "Pips — TF-specific floor. Below this = spread noise."
      status: "LOCKED"
    rejection_wick_pct:
      default: 0.40
      note: |
        0.40 threshold applied to both measurement types:
        - Same-bar sweep (rw=1): standard pin bar wick test (unchanged)
        - Multi-bar sweep (rw>1): synthetic wick = reclaim_distance / (breach_distance + reclaim_distance)
        Synthetic wick measures "how much of the breach was given back" across the full pattern.
      status: "LOCKED — Olya confirmed 2026-03-11"
    max_sweep_size:
      default: "1.5 x ATR(14)"
      note: |
        Beyond 1.5x ATR = continuation classification, but ONLY when no reclaim occurs.
        Reclaim-first evaluation: if price closes back inside within return window,
        it's a sweep regardless of breach size. ATR cap only classifies as continuation
        when there is no reclaim. A large breach that rejects quickly is a strong sweep.
      status: "LOCKED — Olya confirmed 2026-03-11"
    promoted_swing_gate:
      strength_min: 10
      height_pips_min: 10.0
      scope: "current forex day only"
      staleness: "20 bars on native TF"
      note: |
        strength >= 10 = vivid grade. These are swings Olya can see on the chart.
        Height >= 10 pip ensures structural significance.
        Current-day-only prevents stale swings generating false sweep events.
      status: "LOCKED"

  qualified_sweep:
    definition: "Base sweep with displacement context confirmed"
    requires:
      - "base_sweep confirmed"
      - "displacement_before OR displacement_after within window"
    displacement_before:
      lookback_bars: 10
      direction: "into swept level (bearish disp before bullish sweep)"
      model: "reversal"
    displacement_after:
      forward_bars: 5
      direction: "away from swept level (bullish disp after bullish sweep)"
      model: "continuation"
    output_field: "qualified_sweep (bool on every sweep event)"
    note: |
      Base sweep events retained regardless. qualified_sweep=true is
      the strategy layer consumption signal. Tag, not filter.
    consumes: "DISPLACEMENT (locked LTF)"
    status: "LOCKED"

  delayed_sweep:
    status: "REMOVED — absorbed by wider per-TF return window (2026-03-11)"
    note: |
      Multi-bar return now handled by return_window_bars (M1:2, M5:3, M15:4).
      Single sweep type covers same-bar and multi-bar patterns.
      Synthetic wick formula measures rejection quality for multi-bar sweeps.

  dwell_consumption:
    definition: |
      Catches levels breached but not classified as sweep or continuation.
      When price breaches a level and dwells beyond it without a qualifying
      reclaim, the level is consumed (liquidity spent).
    trigger:
      breach_of_level: true
      no_qualifying_reclaim: |
        No bar within the dwell window closes back inside with sufficient
        reclaim distance AND wick rejection to produce a valid sweep.
        A ghost reclaim (close barely inside for one bar) does not save the level.
    consecutive_closes_beyond_level:
      M1: 3
      M5: 3
      M15: 2
    displacement_override:
      rule: |
        If opposite-direction displacement (ATR >= 1.5x, body >= 0.60) fires
        after breach, cancel consumption. Level stays alive for sweep detection.
        The displacement signals rejection — the level is being defended.
      example: |
        Oct 1 03:00 breach of Pre-London Box High: price stays above,
        but 03:15 bearish displacement fires override → level stays alive
        → sweep confirms at 03:15. Displacement IS the rejection signal.
    consume_if: "dwell threshold met AND no displacement override"
    result:
      level_status: CONSUMED
      remove_from_sweep_pool: true
    audit: "CONSUMED events logged in output JSON, hidden from chart markers"
    execution_order: |
      Dwell runs as POST-PASS after sweep/continuation detection.
      If a level already has a sweep, dwell skips it.
      If dwell finds an earlier consumption event than a sweep, the sweep
      is pruned as a phantom (fired on a dead level).
    status: "LOCKED — Olya confirmed 2026-03-11"

  event_consolidation:
    rule: |
      If multiple liquidity pools swept on same candle/direction,
      record single sweep event with multi-source labels.
    collapse_same_event_sweeps: true
    combine_liquidity_labels: true

  pass_through_consumption:
    status: "LOCKED — Olya confirmed 2026-03-12"
    rule: |
      When a breach or sweep occurs, ALL curated pool levels on the same side
      that fall between the target level price and the breach extreme are marked
      PASS_THROUGH_CONSUMED. Price passing through a level = that level's
      liquidity is taken, regardless of whether it was the "intended" target.
    implementation: |
      After each confirmed sweep or continuation:
        1. Identify breach extreme (highest high for bearish, lowest low for bullish)
        2. Scan curated pool for same-side levels between target price and extreme
        3. Mark each intermediate level as PASS_THROUGH_CONSUMED (audit trail only)
        4. These levels are no longer eligible for sweep detection on subsequent bars
    rendering: "NOT rendered. Same as CONSUMED — audit trail only, hidden from chart."
    provenance: "Oct 2 calibration — 3 sweeps in 4 bars on 15m, candle 2 passed through candle 3's target level"

  temporal_dedup:
    status: "RESOLVED — pass-through consumption (not time-based dedup)"
    resolution: |
      Oct 2 cluster (3 sweeps + 2 continuations in 3 bars) was caused by
      price passing through intermediate levels on deeper moves. Resolved
      by pass_through_consumption rule above — geometric, not temporal.
      No time-based dedup needed. Each level breach still evaluated
      independently; pass-through ensures already-crossed levels are consumed.

  chart_rendering:
    SWEEP: "Rendered — arrow markers, standard liquidity_sweep toggle"
    CONTINUATION: "Rendered — square markers with 'C' label, separate sweep_continuation toggle"
    CONSUMED: "NOT rendered. Audit trail only (in JSON output). Hidden from chart markers and counts."
    status: "LOCKED — 2026-03-11"

  calibration_data: |
    Curated pool rebuild (2026-03-07):
      5m  1-bar: 14 base (11 qualified), 15 delayed, 10 cont
        Sources: ASIA_H_L:3, LONDON_H_L:2, LTF_BOX:6, PDH_PDL:2, PROMOTED_SWING:1
      15m 1-bar: 11 base (10 qualified), 15 delayed, 14 cont
        Sources: ASIA_H_L:2, LTF_BOX:6, PDH_PDL:1, PROMOTED_SWING:2
    Pre-rebuild reference (threshold-gated):
      5m 1-bar: 102 base (60 qualified, 14 delayed)
      15m 1-bar: 24 base (13 qualified, 3 delayed)
    Reduction: 5m 102→14 (86%), 15m 24→11 (54%)
    Forensic events (Jan 9 15m): Event 1 fires, Event 3 fires, Event 2 still
    3-bar return (beyond bar+1 cap — confirmed architectural boundary).

  L2_usage:
    placeholder: true

# ═══════════════════════════════════════════════════════════════════════════════
# PRIMITIVE: OTE (Optimal Trade Entry) + Premium/Discount
# Status: LOCKED — Olya confirmed 2026-03-13
# ═══════════════════════════════════════════════════════════════════════════════

OTE:

  L1_detection:
    definition: |
      Fibonacci retracement zone of the post-MSS dealing range.
      Two separate measurement systems on the same impulse leg:
        1. OTE levels: body-to-body (where orders were filled)
        2. Premium/Discount midpoint: wick-to-wick (where liquidity reached)

    ote_measurement:
      description: |
        OTE is measured from candle BODY extremes of the post-MSS expansion leg.
        Body-based measurement keeps the retracement model aligned with
        ICT-style body-based OTE logic. Wicks are liquidity probes,
        bodies are where orders were filled.

      range_definition:
        bullish:
          range_low: "body_low of MSS origin candle (min(open, close) of break bar)"
          range_high: "body_high of displacement extreme candle (max(open, close))"
        bearish:
          range_high: "body_high of MSS origin candle (max(open, close) of break bar)"
          range_low: "body_low of displacement extreme candle (min(open, close))"

      tracked_levels:
        - 0.50    # equilibrium of dealing range (NEW — added per Olya 2026-03-13)
        - 0.618   # OTE zone bottom
        - 0.705   # ICT sweet spot
        - 0.79    # OTE zone top

      pseudocode: |
        if mss.direction == BULLISH:
            range_low  = mss.origin_candle.body_low
            range_high = mss.displacement.extreme_candle.body_high
        elif mss.direction == BEARISH:
            range_high = mss.origin_candle.body_high
            range_low  = mss.displacement.extreme_candle.body_low

        range_size = abs(range_high - range_low)

        # Bullish: retracement DOWN from expansion high
        ote_50   = range_high - range_size * 0.50
        ote_618  = range_high - range_size * 0.382   # 1 - 0.618
        ote_705  = range_high - range_size * 0.295   # 1 - 0.705
        ote_79   = range_high - range_size * 0.21    # 1 - 0.79

        price_in_ote = ote_618 >= current_price >= ote_79

    premium_discount_measurement:
      description: |
        Premium/Discount context measured from WICK extremes of the same
        impulse leg. The midpoint reflects the full traded range including
        liquidity spikes. Separate from the body-based OTE 0.50.

      range_definition:
        bullish:
          range_low: "wick_low of MSS origin candle (low of break bar)"
          range_high: "wick_high of displacement extreme candle (high)"
        bearish:
          range_high: "wick_high of MSS origin candle (high of break bar)"
          range_low: "wick_low of displacement extreme candle (low)"

      tracked_levels:
        - 0.50    # true wick-based premium/discount midpoint

      pseudocode: |
        if mss.direction == BULLISH:
            pd_low  = mss.origin_candle.wick_low
            pd_high = mss.displacement.extreme_candle.wick_high
        elif mss.direction == BEARISH:
            pd_high = mss.origin_candle.wick_high
            pd_low  = mss.displacement.extreme_candle.wick_low

        pd_midpoint = (pd_high + pd_low) / 2

      note: |
        OTE 0.50 and P/D 0.50 will be at different prices whenever
        the anchor candles have wicks (which is most of the time).
        OTE 0.50 = equilibrium of where orders filled.
        P/D 0.50 = equilibrium of where liquidity reached.

    anchor_selection:
      rule: "Most recent MSS defines the anchor. MSS resets the dealing range."
      dependency: "[MSS (LOCKED), Displacement (LOCKED)]"
      status: "LOCKED — Olya confirmed 2026-03-13"
      provenance: "Olya + advisor spec, CTO synthesis 2026-03-13"

    kill_zone_gate:
      rule: |
        OTE entry only valid during active kill zones:
          LOKZ:  03:00-04:00 NY (refined from broad 02:00-05:00)
          NYOKZ: 08:00-09:00 NY
        Outside these windows the OTE zone still EXISTS (computed and displayed),
        but no entry signal is generated.
      status: "LOCKED — Olya confirmed 2026-03-13 (same session as NY Windows lock)"
      provenance: "Olya confirmed kill zone windows earlier in session"

  L15_parameters:
    fib_levels:
      levels: [0.50, 0.618, 0.705, 0.79]
      note: |
        0.50 = dealing range equilibrium (body-based). Added per Olya 2026-03-13.
        0.618 / 0.705 / 0.79 = standard ICT OTE zone.
        0.705 ("the sweet spot") is unique to ICT methodology.
      status: "LOCKED — Olya confirmed 2026-03-13"
    premium_discount:
      levels: [0.50]
      measurement: "wick-to-wick"
      note: "Separate from OTE 0.50. Full traded range midpoint."
      status: "LOCKED — Olya confirmed 2026-03-13"

  L2_usage:
    placeholder: true
    note: |
      OTE zone + P/D context feed into the five-factor checklist (factor 4).
      Strategy Designer tool (Phase 5) will validate L2 assembly.

  status: "LOCKED — Olya confirmed 2026-03-13"

