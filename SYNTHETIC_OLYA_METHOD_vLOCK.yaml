constants:

  pip:
    EURUSD: 0.0001

  forex_day:
    boundary: "17:00 NY"
    midnight_open: "00:00 NY"
    dst_rule: "Always NY local (auto-adjusts EST/EDT)"

  sessions:
    asia:     {start: "19:00 NY", end: "00:00 NY", note: "prior calendar day start"}
    lokz:     {start: "02:00 NY", end: "05:00 NY", name: "London Open Kill Zone"}
    nyokz:    {start: "07:00 NY", end: "10:00 NY", name: "NY Open Kill Zone"}
    # Gap periods (00:00-02:00, 05:00-07:00, 10:00+) tagged as "other"

  timeframes:
    execution: [5m, 15m]        # where Olya marks and trades
    direction: [1H, 4H, 1D, W]  # HTF bias — future phase
    reference: [1m]              # raw data, not primary detection TF
    primary: 5m                  # Olya's execution TF

  detection_rule: |
    All primitives detect NATIVELY on each timeframe's own bar arrays.
    5m FVG = gap across 3 consecutive 5m candles (genuine HTF gap).
