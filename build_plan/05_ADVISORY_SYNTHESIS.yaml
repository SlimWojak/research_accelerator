# ─── CTO REVIEW: Q1 — CASCADE GRAPH EDGE CORRECTION ─────────────────────────

cto_q1_cascade_edge:
  feedback: |
    Remove direct swing_points → liquidity_sweep edge. Raw previous swings
    are excluded from sweep pool (locked March 7). Swing points reach sweeps
    only via htf_liquidity (which applies promotion/quality gate).
    Direct edge causes false cache invalidation on swing param changes.
  verdict: ACCEPTED
  rationale: |
    Correct. The promoted swing path in the pipeline (lines 1515-1531) gates
    on strength >= 10 AND height >= 10 pip AND current forex day, then feeds
    into the curated level pool. This is a filter applied during pool assembly,
    not a direct swing → sweep dependency. However, there IS a subtlety:
    promoted swings are filtered from the swing_points output during pool
    assembly in detect_sweeps(), not in htf_liquidity. So the dependency is
    technically swing_points → [promotion filter in sweep pool assembly] →
    liquidity_sweep. The htf_liquidity module handles the EQH/EQL structural
    pools only.
  resolution: |
    Keep swing_points as upstream of liquidity_sweep BUT mark it as a
    "filtered dependency" — only the promoted subset triggers re-evaluation.
    In practice: the cascade engine should track that swing_points →
    liquidity_sweep is filtered through the promotion gate. If swing N
    changes, the promoted swing set may change, which may change the sweep
    level pool. This is correct behavior — we WANT sweep re-evaluation
    when swing params change, because the promoted swing gate depends on
    strength/height which depend on N.
  config_update: |
    In 01_RUNTIME_CONFIG_SCHEMA.yaml, annotate the dependency:
    liquidity_sweep.upstream:
      - session_liquidity
      - reference_levels
      - htf_liquidity          # EQH/EQL pools
      - swing_points           # promoted swings only (strength>=10, height>=10pip)

