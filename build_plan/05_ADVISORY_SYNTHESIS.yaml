# ─── CTO REVIEW: Q3 — MSS IMPULSE SUPPRESSION ──────────────────────────────

cto_q3_mss_suppression:
  feedback: |
    Impulse suppression pullback threshold is hardcoded. Should be L1.5 param.
    CTO advisor said "50% pullback" but actual pipeline code uses:
      min_pb = max(5 * PIP, 0.25 * ATR)
    This is already documented in v0.5 (L15_parameters.ltf.impulse_suppression).
  verdict: ACCEPTED_WITH_CORRECTION
  correction: |
    The threshold is max(5pip, 0.25*ATR), NOT 50%. CTO advisor's memory
    was off on the number. The v0.5 YAML correctly documents this.
    The pipeline (line 2116) confirms: max(5 * PIP, 0.25 * atr_at).
  resolution: |
    Parameterise in runtime config as:
      mss.params.ltf.impulse_suppression:
        pullback_pip_floor: 5
        pullback_atr_factor: 0.25
    These already exist in 01_RUNTIME_CONFIG_SCHEMA.yaml — confirmed correct.
  cluster_straddle_note: |
    CTO also flagged cluster-straddle timestamp handling. Pipeline logic
    (lines 2145-2250): when checking displacement match for a swing break,
    it searches disp_by_idx at indices [i-1, i, i+1, i+2, i+3] where i is
    the break bar. For clusters, the displacement dict is keyed by the
    cluster's FIRST bar index. So a cluster starting at i-1 and ending at i
    naturally covers the straddle case via the i-1 lookup. Module must
    replicate this indexing behavior exactly.

