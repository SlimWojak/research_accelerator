# ─── CTO REVIEW: Q5 — SWEEP TEMPORAL GATING ─────────────────────────────────

cto_q5_temporal_gating:
  feedback: "Extract exact rules from pipeline. Gap in v0.5 documentation."
  verdict: ACCEPTED
  resolution: |
    Extracted from preprocess_data_v2.py (lines 1488-1631, 1690-1710).
    Table below is the canonical temporal gating specification.

# CANONICAL TEMPORAL GATING TABLE — extracted from pipeline code
# This is the definitive reference for the liquidity_sweep module.
temporal_gates:

  ASIA_H_L:
    valid_from: "00:00 NY on the forex day"
    valid_until: "end of forex day (17:00 NY)"
    scope: "current forex day only"
    pipeline_ref: "_session_close_time(forex_day, 'asia') → day.replace(hour=0)"
    note: "Asia session ends at 00:00 NY. Level valid from session close."

  LONDON_H_L:
    valid_from: "05:00 NY on the forex day"
    valid_until: "end of forex day"
    scope: "current forex day only"
    pipeline_ref: "_session_close_time(forex_day, 'lokz') → day.replace(hour=5)"
    note: "LOKZ session ends at 05:00 NY. Level valid from session close."

  LTF_BOX_H_L:
    valid_from: "box.end_time (specific to each box object)"
    valid_until: "end of forex day"
    scope: "current forex day only"
    pipeline_ref: "box.get('end_time') — varies per box type"
    end_times:
      asia_box: "00:00 NY"
      pre_london_box: "02:00 NY"
      pre_ny_box: "07:00 NY"
    note: "Each box's H/L becomes valid when the box's session window closes."

  PDH_PDL:
    valid_from: "17:00 NY on the PREVIOUS calendar day (= forex day open)"
    valid_until: "end of forex day"
    scope: "current forex day only"
    pipeline_ref: "prev.replace(hour=17, minute=0)"
    note: |
      PDH/PDL are known from the moment the new forex day opens.
      The previous day's high/low are facts by 17:00 NY.

  PWH_PWL:
    valid_from: "17:00 NY on Sunday (= week open)"
    valid_until: "end of trading week (Friday 17:00 NY)"
    scope: "entire week"
    pipeline_ref: "hardcoded '2024-01-07T17:00:00' for calibration dataset"
    note: |
      Pipeline uses hardcoded date for the 1-week dataset.
      RA module must compute dynamically: previous week's high/low,
      valid from current week's open (Sunday 17:00 NY).

  HTF_EQH_EQL:
    valid_from: "pool.last_touch_time (second touch confirms pool)"
    valid_until: "consumed (TAKEN) or indefinite"
    scope: "no expiry — valid until price trades through"
    pipeline_ref: "pool.get('last_touch_time')"
    note: |
      HTF pools become actionable at second touch. Pool emitted with
      first_touch_time (display origin) but gated by last_touch_time.

  PROMOTED_SWING:
    valid_from: "swing detection time (bar time)"
    valid_until: "staleness gate: 20 bars on native TF OR end of forex day"
    scope: "current forex day only"
    pipeline_ref: "lv['bar_index'] >= i → skip; i - lv['bar_index'] > 20 → skip; forex_day mismatch → skip"
    gate: "bar_index < current_bar AND age <= 20 bars AND same forex day"
    note: |
      Promoted swings use bar_index comparison (not timestamp string).
      Three gates: not-future, not-stale, same-day. This is the only
      source that uses bar_index rather than valid_from timestamp.

  temporal_comparison_rule: |
    For all non-promoted-swing sources: string comparison bar_time < valid_from.
    Timestamps in NY time format 'YYYY-MM-DDTHH:MM:SS'.
    For promoted swings: integer bar_index comparison.
    The off-by-one concern (CTO Issue 7): the pipeline uses strict less-than
    (bar_time < valid_from), meaning a bar AT exactly the valid_from time
    CAN see the level. A bar BEFORE it cannot. This is correct — the level
    becomes valid at the exact close of its formation session, and the bar
    at that timestamp is the first bar of the next period.

# ─── CTO REVIEW (SECOND REVIEWER): ISSUES 1-7 ──────────────────────────────

cto2_issue1_cache_invalidation:
  feedback: "Make invalidation rule explicit: node + all downstream dependents."
  verdict: ACCEPTED
  resolution: |
    Rule for cascade.py:
      on_param_change(primitive_name):
        invalidated = {primitive_name} ∪ all_transitive_downstream(primitive_name)
        for node in topological_order:
          if node in invalidated: re-run
          else: serve from cache
    This is standard DAG invalidation. Explicit in cascade engine code.

cto2_issue2_schema_validation:
  feedback: "Use pydantic or jsonschema for config validation."
  verdict: ACCEPTED
  resolution: |
    Use pydantic v2 for runtime config validation. Type-safe, fast,
    produces clear error messages. Schema defined as pydantic models
    that mirror the YAML structure. Reject unknown fields (extra='forbid').
    Add pydantic to requirements.txt.

cto2_issue3_detection_ids:
  feedback: "Deterministic IDs for cross-module referencing."
  verdict: ACCEPTED
  resolution: |
    Format: {primitive}_{tf}_{timestamp_ny}_{direction}
    Example: fvg_5m_2024-01-08T09:10:00_bull
    For composites with upstream refs: mss_5m_2024-01-08T09:35:00_bear
      with upstream_refs: [swing_5m_2024-01-08T09:20:00_high, disp_5m_2024-01-08T09:35:00_bear]
    Timestamp is bar time in NY (matches v0.5 convention).
    ID is deterministic: same inputs → same ID.
    Add 'id' field to Detection dataclass in engine/base.py.

cto2_issue4_partial_bars:
  feedback: "Discard partial bars at dataset boundaries."
  verdict: ACCEPTED
  resolution: |
    TF aggregator must check: first and last aggregation windows may be
    partial if dataset doesn't start/end on TF boundary. Discard any
    aggregated bar where the constituent 1m bar count < expected count
    for the TF (e.g., 5m bar must have 5 constituent 1m bars, or all
    ghosts for the missing slots). This is already handled implicitly
    by the current pipeline (forex day boundaries at 17:00 NY align
    with standard TF boundaries), but the RA module should guard
    explicitly.

cto2_issue5_cluster_straddle:
  feedback: "MSS should treat displacement cluster as single event."
  verdict: CONFIRMED
  resolution: "Already addressed in cto_q3 above. Pipeline indexes displacement by first bar of cluster."

cto2_issue6_ob_fallback:
  feedback: "Max 3 bars, no deeper."
  verdict: CONFIRMED
  resolution: "Already addressed in cto_q4 above."

cto2_issue7_sweep_offbyone:
  feedback: "Level valid after formation bar closes. Confirm off-by-one."
  verdict: CONFIRMED
  resolution: |
    Confirmed from pipeline code (line 1704-1706):
      vf = lv.get('valid_from', '')
      if vf and bar_time < vf:
          continue
    Strict less-than. Bar at valid_from time CAN see the level.
    Bar before it cannot. Documented in temporal_gates section above.

