# ═══════════════════════════════════════════════════════════════════════════════
# SEARCH SPACE — parameter perturbation bounds for search.py
# ═══════════════════════════════════════════════════════════════════════════════
# Defines which parameters to perturb and their allowable ranges.
# Used by: python3 search.py --search-space configs/search_space.yaml
# ═══════════════════════════════════════════════════════════════════════════════

parameters:
  displacement.ltf.atr_multiplier:
    type: numeric
    base: 1.5
    min: 1.0
    max: 3.0
    step: 0.25

  displacement.ltf.body_ratio:
    type: numeric
    base: 0.60
    min: 0.40
    max: 0.85
    step: 0.05

  swing_points.N.5m:
    type: numeric
    base: 3
    min: 2
    max: 8
    step: 1

  swing_points.N.15m:
    type: numeric
    base: 2
    min: 1
    max: 6
    step: 1

  mss.ltf.confirmation_window_bars:
    type: numeric
    base: 3
    min: 1
    max: 8
    step: 1
